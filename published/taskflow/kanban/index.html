            filters.priority.forEach(v => chips.push(chip('priority', v, PRIORITY_LABELS[v], PRIORITY_COLORS[v])));
            filters.assignee.forEach(id => { const m = team.find(x=>x.id===id); chips.push(chip('assignee', id, m?escapeHtml(m.nom):'Membre')); });
            filters.status.forEach(v => { const sc = statusCfg.byValue[v]; chips.push(chip('status', v, sc?escapeHtml(sc.label):v, sc&&sc.fillColor)); });
            if (searchQuery) chips.push(`<span class="fc-chip">« ${escapeHtml(searchQuery)} »<span class="fc-x" title="Effacer la recherche" onclick="clearSearchChip()">${X}</span></span>`);
            if (!chips.length) { bar.style.display = 'none'; bar.innerHTML = ''; return; }
            bar.style.display = 'flex';
            bar.innerHTML = '<span class="fc-label">Filtres actifs</span>' + chips.join('') + '<span class="fc-clear-all" onclick="clearAllFilters()">Tout effacer</span>';
        }
        function removeFilterChip(type, val) { toggleFilterValue(type, val); }
        function clearSearchChip() { searchQuery = ''; const si = document.getElementById('searchInput'); if (si) si.value = ''; updateFilterMenus(); render(); }
        function toggleFilterValue(type, val) { const arr = filters[type]; const idx = arr.indexOf(val); if (idx === -1) arr.push(val); else arr.splice(idx, 1); updateFilterMenus(); broadcastFilters(); render(); }
        function handleSearch(q) { searchQuery = q.toLowerCase(); render(); }
        function clearAllFilters() {
            filters = { project: [], priority: [], assignee: [], status: [] };
            searchQuery = '';
            const si = document.getElementById('searchInput'); if (si) si.value = '';
            updateFilterMenus(); broadcastFilters(); render();
        }
        function getFilteredTasks() {
            return tasks.filter(t => {
                // WBS-03: par défaut afficher uniquement les racines (pas les sous-tâches)
                if (!showSubtasks && t.parentTask) return false;
                if (filters.project.length && !filters.project.includes(t.projet)) return false;
                if (filters.priority.length && !filters.priority.includes(getPriority(t))) return false;
                if (filters.assignee.length && !getAssignees(t).some(a => filters.assignee.includes(a))) return false;
                if (filters.status.length && !filters.status.includes(t.statut || 'todo')) return false;
                if (searchQuery && !(t.titre||'').toLowerCase().includes(searchQuery)) return false;
                return true;
            });
        }
        // WBS-03: toggle d'inclusion des sous-tâches dans le kanban
        function toggleShowSubtasks() {
            showSubtasks = !showSubtasks;
            localStorage.setItem('taskflow_kanban_showsubs', showSubtasks ? '1' : '0');
            const btn = document.getElementById('btnShowSubs');
            if (btn) btn.classList.toggle('active', showSubtasks);
            updateFilterMenus();
            render();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════════════════════════════════════
        function render() {
            sortableInstances.forEach(s => s.destroy());
            sortableInstances = [];
            const container = document.getElementById('kanbanContainer');
            const ft = getFilteredTasks();
            const columns = buildColumns(ft);
            
            container.innerHTML = columns.map(col => `
                <div class="kanban-column" data-key="${col.key}">
                    <div class="column-header">
                        <span class="column-title">${col.icon || ''} ${escapeHtml(col.label)} <span class="column-count">${col.tasks.length}</span></span>
                        <button class="column-add" onclick="openCreatePanelForColumn('${col.key}')" title="Ajouter">+</button>
                    </div>
                    <div class="column-body ${col.tasks.length ? '' : 'is-empty'}" id="col-${col.key}">${col.tasks.length ? col.tasks.map(t => renderCard(t)).join('') : renderEmptyColumn(col)}</div>
                </div>
            `).join('');
            
            // Initialize Sortable
            columns.forEach(col => {
                const el = document.getElementById(`col-${col.key}`);
                if (el) {
                    sortableInstances.push(new Sortable(el, {
                        group: 'tasks', animation: 150, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
                        onEnd: (evt) => handleDrop(evt)
                    }));
                }
            });
        }

        function renderEmptyColumn(col) {
            const hasFilters = searchQuery || filters.project.length || filters.priority.length || filters.assignee.length || filters.status.length;
            const inbox = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>';
            const search = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
            if (hasFilters) {
                return `<div class="tf-empty">
                    <span class="tf-empty-glyph">${search}</span>
                    <div class="tf-empty-title">Aucun résultat</div>
                    <div class="tf-empty-sub">Aucune tâche ne correspond aux filtres dans « ${escapeHtml(col.label)} ».</div>
                    <button class="tf-empty-btn" onclick="clearAllFilters()">Effacer les filtres</button>
                </div>`;
            }
            return `<div class="tf-empty">
                <span class="tf-empty-glyph">${inbox}</span>
                <div class="tf-empty-title">Rien dans « ${escapeHtml(col.label)} »</div>
                <div class="tf-empty-sub">Glissez une tâche ici ou créez-en une nouvelle.</div>
                <button class="tf-empty-btn" onclick="openCreatePanelForColumn('${col.key}')"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nouvelle tâche</button>
            </div>`;
        }

        function renderSkeleton() {
            const container = document.getElementById('kanbanContainer');
            if (!container) return;
            const card = '<div class="tf-skel-card"><div class="tf-sk" style="width:70%;height:10px"></div><div style="display:flex;gap:6px;margin-top:11px"><div class="tf-sk" style="width:52px;height:18px;border-radius:9px"></div><div class="tf-sk" style="width:40px;height:18px;border-radius:9px"></div></div><div class="tf-sk" style="width:100%;height:5px;margin-top:12px"></div><div style="display:flex;gap:5px;margin-top:11px"><div class="tf-sk" style="width:24px;height:24px;border-radius:50%"></div><div class="tf-sk" style="width:24px;height:24px;border-radius:50%"></div></div></div>';
            const cols = statusCfg.list.slice(0, 4);
            container.innerHTML = cols.map((s, i) => `
                <div class="kanban-column">
                    <div class="column-header">
                        <span class="column-title"><span class="tf-sk" style="width:${70 + i*14}px;height:13px"></span></span>
                    </div>
                    <div class="column-body">${card.repeat(i === 1 ? 3 : 2)}</div>
                </div>
            `).join('');
        }

        function buildColumns(ft) {
            if (groupBy === 'statut') {
                return statusCfg.list.map(s => ({ key: s.value, label: s.label, icon: '', tasks: ft.filter(t => t.statut === s.value) }));
            } else if (groupBy === 'priorite') {
                return [1,2,3,4].map(p => ({ key: String(p), label: PRIORITY_LABELS[p], icon: '', tasks: ft.filter(t => getPriority(t) === p) }));
            } else if (groupBy === 'projet') {
                const cols = projects.filter(p => p.actif !== false).map(p => ({ key: String(p.id), label: p.nom, icon: `<span style="color:${p.couleur}">●</span>`, tasks: ft.filter(t => t.projet === p.id) }));
                cols.push({ key: 'none', label: 'Sans projet', icon: '', tasks: ft.filter(t => !t.projet) });
                return cols;
            }
            return [];
        }

        function renderCard(t) {
            const p = getPriority(t);
            const assignees = getAssignees(t);
            const deps = getDependsOn(t);
            const projectName = getProjectName(t.projet);
            const projectColor = getProjectColor(t.projet);
            const typeIcon = TYPE_ICONS[t.type] || '';
            const subs = getSubtasks(t);
            const subsDone = subs.filter(s => s.done).length;
            const nChildren = getChildren(t.id).length;
            const isChild = !!t.parentTask;

            const barColor = getTaskColor(t);
            const prog = t.progression || 0;
            let dueHtml = '';
            if (t.dateEcheance && t.type !== 'jalon') {
                const _e = gristToDate(t.dateEcheance);
                if (_e) {
                    const _t0 = new Date(); _t0.setHours(0,0,0,0);
                    const _d = new Date(_e); _d.setHours(0,0,0,0);
                    const _days = Math.round((_d - _t0) / 86400000);
                    const _done = TF.isTerminal(statusCfg, t.statut);
                    const _st = _done ? '' : _days < 0 ? 'over' : _days <= 2 ? 'soon' : '';
                    const _MO = ['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];
                    dueHtml = `<span class="tf-due ${_st}">${_d.getDate()} ${_MO[_d.getMonth()]}</span>`;
                }
            }
            return `<div class="task-card p${p} ${TF.isTerminal(statusCfg, t.statut) ? 'done' : ''} ${t.id === selectedTaskId ? 'selected' : ''}" data-id="${t.id}" style="border-left-color:${barColor}" onclick="openTaskPanel(${t.id})">
                <div class="card-header">
                    <span class="card-title">${isChild ? '↳ ' : ''}${escapeHtml(t.titre) || 'Sans titre'}</span>
                    ${typeIcon ? `<span class="card-type">${typeIcon}</span>` : ''}
                </div>
                <div class="card-meta">
                    <span class="tf-badge tf-p${p}">${PRIORITY_LABELS[p]}</span>
                    ${projectName ? `<span class="card-project"><span style="color:${projectColor}">●</span> ${escapeHtml(projectName)}</span>` : ''}
                    ${deps.length ? `<span class="card-deps">← ${deps.length}</span>` : ''}
                    ${subs.length ? `<span class="card-subs${subsDone === subs.length ? ' complete' : ''}" title="Sous-tâches (checklist)">◎ ${subsDone}/${subs.length}</span>` : ''}
                    ${nChildren ? `<span class="card-subs" title="Sous-tâches (hiérarchie)" onclick="event.stopPropagation();openTaskPanel(${t.id})">↳ ${nChildren}</span>` : ''}
                    ${dueHtml}
                </div>
                ${t.type !== 'jalon' ? `<div class="card-progress-row"><div class="card-progress" onclick="event.stopPropagation();setCardProgress(event, ${t.id})"><div class="card-progress-fill p${p}" style="width:${prog}%"></div></div><span class="card-progress-pct">${prog}%</span></div>` : ''}
                ${assignees.length ? `<div class="card-assignees">${assignees.slice(0, 3).map(id => `<div class="card-avatar" style="background:${getTeamMemberColor(id)}">${getInitials(getTeamMemberName(id))}</div>`).join('')}${assignees.length > 3 ? `<div class="card-avatar more">+${assignees.length - 3}</div>` : ''}</div>` : ''}
            </div>`;
        }

        async function handleDrop(evt) {
            const taskId = parseInt(evt.item.dataset.id);
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            // Lire la colonne de destination depuis evt.to (le conteneur d'arrivée).
            // Utiliser col.key capturée en closure donnerait la source, pas la destination.
            const colKey = (evt.to && evt.to.id) ? evt.to.id.replace(/^col-/, '') : null;
            if (colKey === null) return;

            let updates = {};
            if (groupBy === 'statut') { updates.statut = colKey; const _wasT = TF.isTerminal(statusCfg, task.statut), _nowT = TF.isTerminal(statusCfg, colKey); if (_nowT) { updates.progression = 100; if (!_wasT) updates.dateCloture = Math.floor(Date.now() / 1000); } else if (_wasT) updates.dateCloture = null; }
            else if (groupBy === 'priorite') updates.priorite = parseInt(colKey, 10);
            else if (groupBy === 'projet') updates.projet = colKey === 'none' ? null : parseInt(colKey, 10);
            
            Object.assign(task, updates);
            
            if (gristReady) {
                try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, pruneTaskRecord(updates)]]); showSaveIndicator(); }
                catch (e) { showToast('Erreur déplacement', 'error'); await loadAllData(); }
            }
            render();  // garde les états vides cohérents après un déplacement
        }

        // ═══════════════════════════════════════════════════════════════════════
        // PANEL
        // ═══════════════════════════════════════════════════════════════════════
        function openPanel() { 
            panelState.open = true; 
            document.getElementById('panel').classList.add('open'); 
            document.getElementById('kanbanContainer').classList.add('panel-open'); 
            document.getElementById('panelOverlay').classList.add('visible');
        }
        function closePanel() { 
            panelState.open = false; 
            document.getElementById('panel').classList.remove('open'); 
            document.getElementById('kanbanContainer').classList.remove('panel-open'); 
            document.getElementById('panelOverlay').classList.remove('visible');
            panelState = { open: false, isNew: false, taskId: null, taskIndex: -1, columnTasks: [], columnKey: null, editData: null }; 
            selectedTaskId = null; 
            render(); 
        }
        // BUG-04 FIX: Confirmation avant fermeture si nouvelle tâche non sauvegardée
        function confirmClosePanel() {
            if (panelState.isNew && panelState.editData?.titre?.trim()) {
                if (confirm('Fermer sans créer la tâche ?')) closePanel();
            } else {
                closePanel();
            }
        }

        function openTaskPanel(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            selectedTaskId = taskId;
            
            // Find column tasks for navigation
            const ft = getFilteredTasks();
            const columns = buildColumns(ft);
            let colKey = null, colTasks = [];
            for (const col of columns) {
                const idx = col.tasks.findIndex(t => t.id === taskId);
                if (idx !== -1) { colKey = col.key; colTasks = col.tasks; break; }
            }
            
            panelState.taskId = taskId;
            panelState.taskIndex = colTasks.findIndex(t => t.id === taskId);
            panelState.columnTasks = colTasks;
            panelState.columnKey = colKey;
            panelState.isNew = false;
            panelState.editData = cloneTaskData(task);
            renderPanelTask();
            openPanel();
            if (gristReady) grist.setSelectedRows([taskId]);
            render();
        }

        function openCreatePanel() { openCreatePanelForColumn(groupBy === 'statut' ? 'todo' : groupBy === 'priorite' ? '3' : projects.length ? String(projects[0].id) : 'none'); }

        function openCreatePanelForColumn(colKey) {
            const today = new Date();
            let preset = {};
            if (groupBy === 'statut') preset.statut = colKey;
            else if (groupBy === 'priorite') preset.priorite = colKey;
            else if (groupBy === 'projet') preset.projet = colKey === 'none' ? null : parseInt(colKey);

            panelState = {
                open: true, isNew: true, taskId: null, taskIndex: -1, columnTasks: [], columnKey: colKey,
                editData: { titre: '', description: '', type: 'tache', priorite: preset.priorite || '3', statut: preset.statut || 'todo', progression: 0, dateDebut: dateToGrist(today), dateEcheance: dateToGrist(addDays(today, 7)), projet: preset.projet !== undefined ? preset.projet : (projects.length > 0 ? projects[0].id : null), assignees: [], dependDe: [], tags: [], estimationH: null, tempsPasse: null, subtasks: [], couleur: null, parentTask: null, charges: [] }
            };
            renderPanelTask();
            openPanel();
            render();
            setTimeout(() => document.getElementById('taskTitle')?.focus(), 100);
        }
        // WBS-03: création d'une sous-tâche
        function openCreateTaskWithParent(parentId) {
            const today = new Date();
            const parent = parentId ? tasks.find(t => t.id === parentId) : null;
            panelState = {
                open: true, isNew: true, taskId: null, taskIndex: -1, columnTasks: [], columnKey: null,
                editData: { titre: '', description: '', type: 'tache', priorite: '3', statut: 'todo', progression: 0, dateDebut: dateToGrist(today), dateEcheance: dateToGrist(addDays(today, 7)), projet: parent?.projet || (projects.length > 0 ? projects[0].id : null), assignees: [], dependDe: [], tags: [], estimationH: null, tempsPasse: null, subtasks: [], couleur: null, parentTask: parentId || null, charges: [] }
            };
            renderPanelTask();
            openPanel();
            render();
            setTimeout(() => document.getElementById('taskTitle')?.focus(), 100);
        }
        function detachFromParent() { updateField('parentTask', null); }
        function setParent(newParentId) {
            if (panelState.taskId && !canSetParent(panelState.taskId, newParentId)) {
                showToast('Cycle détecté — choix impossible', 'error');
                return;
            }
            updateField('parentTask', newParentId);
        }

        function cloneTaskData(task) { return { titre: task.titre || '', description: task.description || '', type: task.type || 'tache', priorite: String(task.priorite || '3'), statut: task.statut || 'todo', progression: task.progression || 0, dateDebut: task.dateDebut, dateEcheance: task.dateEcheance, projet: task.projet || null, assignees: getAssignees(task), dependDe: getDependsOn(task), tags: getTags(task), estimationH: task.estimationH || null, tempsPasse: task.tempsPasse || null, subtasks: getSubtasks(task), couleur: task.couleur || null, parentTask: task.parentTask || null, charges: TF.parseCharges(task.charges), dateCloture: task.dateCloture || null }; }
        
        // FIX: Synchroniser editData vers le task local dans tasks[]
        function syncLocalTask() {
            if (panelState.isNew || !panelState.taskId) return;
            const task = tasks.find(t => t.id === panelState.taskId);
            const data = panelState.editData;
            if (!task || !data) return;
            task.titre = data.titre;
            task.description = data.description;
            task.type = data.type;
            task.priorite = data.priorite;
            task.statut = data.statut;
            task.progression = data.progression;
            task.dateDebut = data.dateDebut;
            task.dateEcheance = data.dateEcheance;
            task.projet = data.projet;
            task.assignees = ['L', ...data.assignees];
            task.dependDe = ['L', ...data.dependDe];
            task.tags = ['L', ...data.tags];
            task.estimationH = data.estimationH;
            task.tempsPasse = data.tempsPasse;
            task.subtasks = subtasksToJson(data.subtasks);
            task.couleur = data.couleur || null;
            task.parentTask = data.parentTask || null;
            task.charges = TF.chargesToJson((data.charges || []).filter(c => data.assignees.includes(c.teamId)));
        }

        function navigatePanelTask(dir) {
            if (panelState.isNew || panelState.columnTasks.length < 2) return;
            let newIdx = panelState.taskIndex + dir;
            if (newIdx < 0) newIdx = panelState.columnTasks.length - 1;
            if (newIdx >= panelState.columnTasks.length) newIdx = 0;
            const t = panelState.columnTasks[newIdx];
            if (t) openTaskPanel(t.id);
        }

        function renderPanelTask() {
            const header = document.getElementById('panelHeader');
            const content = document.getElementById('panelContent');
            const footer = document.getElementById('panelFooter');
            const data = panelState.editData;
            if (!data) { closePanel(); return; }

            const canNavigate = panelState.columnTasks.length > 1 && !panelState.isNew;
            const navLabel = !panelState.isNew && panelState.columnTasks.length > 1 ? `${panelState.taskIndex + 1}/${panelState.columnTasks.length}` : '';
            header.innerHTML = `<div class="panel-nav"><button class="panel-nav-btn" onclick="navigatePanelTask(-1)" ${!canNavigate ? 'disabled' : ''}>◀</button>${navLabel ? `<span class="panel-title">${navLabel}</span>` : ''}<button class="panel-nav-btn" onclick="navigatePanelTask(1)" ${!canNavigate ? 'disabled' : ''}>▶</button></div><button class="panel-close" onclick="confirmClosePanel()">×</button>`;

            const s = gristToDate(data.dateDebut), e = gristToDate(data.dateEcheance);
            const priorityColor = PRIORITY_COLORS[getPriority(data)] || '#94a3b8';
            const currentProject = projects.find(p => p.id === data.projet);
            const projectColor = currentProject?.couleur || '#94a3b8';
            const projectOptions = projects.filter(p => p.actif !== false).map(p => `<option value="${p.id}" ${data.projet === p.id ? 'selected' : ''}>${escapeHtml(p.nom)}</option>`).join('');
            const subtasksDone = (data.subtasks || []).filter(st => st.done).length;
            const subtasksTotal = (data.subtasks || []).length;
            const descLabel = data.type === 'reunion' ? 'Ordre du jour' : data.type === 'jalon' ? 'Critères d\'acceptation' : 'Description';
            const assignLabel = data.type === 'reunion' ? 'Participants' : 'Assignés';
            const titlePlaceholder = data.type === 'jalon' ? 'Nom du jalon...' : data.type === 'reunion' ? 'Sujet de la réunion...' : 'Titre de la tâche...';

            // Assignés
            const assigneesChips = data.assignees.map(id => `<span class="multi-select-chip">${escapeHtml(getTeamMemberName(id))}<span class="remove" onclick="event.stopPropagation();removeAssignee(${id})">×</span></span>`).join('');
            // A15: Options membres avec dot couleur + swatches preset
            const assigneesOptions = team.filter(m => m.actif !== false).map(m => {
                const swatches = COLOR_PRESETS.map(c => `<span class="color-swatch" style="background:${c}" onclick="event.stopPropagation();setMemberColor(${m.id},'${c}')"></span>`).join('');
                return `<div class="multi-select-option ${data.assignees.includes(m.id) ? 'selected' : ''}" onclick="toggleAssignee(${m.id})"><div class="member-color-wrap"><span class="member-color-dot" style="background:${getTeamMemberColor(m.id)}" onclick="event.stopPropagation();this.nextElementSibling.classList.toggle('open')"></span><div class="member-color-picker">${swatches}</div></div><input type="checkbox" ${data.assignees.includes(m.id) ? 'checked' : ''} onclick="event.stopPropagation();toggleAssignee(${m.id})">${escapeHtml(m.nom)}</div>`;
            }).join('');

            // #3 : charge par personne (heures par assigné)
            const chargeOf = (mid) => { const c = (data.charges || []).find(x => x.teamId === mid); return c ? c.heures : 0; };
            const chargeTotalH = (data.charges || []).reduce((sum, c) => (data.assignees.includes(c.teamId) ? sum + (Number(c.heures) || 0) : sum), 0);
            const chargeDescs = (!panelState.isNew && panelState.taskId) ? getAllDescendants(panelState.taskId) : [];
            const chargeConsol = chargeDescs.length ? TF.chargeByMember([{ charges: TF.chargesToJson(data.charges) }].concat(chargeDescs)) : null;
            const chargeConsolHtml = (chargeConsol && Object.keys(chargeConsol).length) ? ('<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)"><div class="prop-label" style="margin-bottom:6px">Consolidé (avec sous-tâches)</div>' + Object.keys(chargeConsol).map(function(tid){ return '<div class="charge-row"><span class="an">' + escapeHtml(getTeamMemberName(Number(tid))) + '</span><span style="font-weight:600;font-size:0.82rem">' + chargeConsol[tid] + ' h</span></div>'; }).join('') + '<div style="margin-top:6px;font-size:0.78rem;color:var(--text-muted)">Total consolidé : <strong>' + Object.values(chargeConsol).reduce(function(s,h){ return s + h; }, 0) + '</strong> h</div></div>') : '';
            const chargeRows = data.assignees.map(id => `<div style="display:flex;align-items:center;gap:8px"><span style="flex:1;font-size:0.8rem">${escapeHtml(getTeamMemberName(id))}</span><input type="number" min="0" step="0.5" value="${chargeOf(id)}" onchange="updateCharge(${id}, this.value)" style="width:64px;padding:4px 6px;border:1px solid var(--border);border-radius:6px"><span style="font-size:0.75rem;color:var(--text-muted)">h</span></div>`).join('');

            // Dépendances (pour tâche uniquement)

                        </div></div>
                    </div>
                    ${(!panelState.isNew || data.parentTask) ? `

                        <span class="prop-label">Parent</span>

                                ? `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">

                            ${data.assignees.length ? `<div class="asg-list">${data.assignees.map(id => { const nm = getTeamMemberName(id) || '?'; const initials = nm.split(' ').filter(Boolean).map(w => w[0]).slice(0,2).join('').toUpperCase(); const mem = team.find(x => x.id === id); return `<div class="asg"><span class="asg-ava" style="background:${getTeamMemberColor(id)}">${escapeHtml(initials)}</span><span class="an">${escapeHtml(nm)}</span>${mem && mem.role ? `<span class="ar">${escapeHtml(mem.role)}</span>` : ''}<button class="asg-x" title="Retirer" onclick="removeAssignee(${id})">×</button></div>`; }).join('')}</div>` : ''}
                            <div class="multi-select" id="assigneesSelect"><button class="addbtn" onclick="toggleMultiSelect('assigneesSelect')"><span style="font-size:1rem;line-height:1">+</span> ${data.type === 'reunion' ? 'Ajouter un participant' : 'Assigner un membre'}</button><div class="multi-select-dropdown">${assigneesOptions || '<div class="multi-select-empty">Aucun membre</div>'}</div></div>

                    </div>
                    ${data.type === 'tache' ? `
                    <div class="prop-row">

                        <div class="prop-value">
                            <div class="tc-grid">
                                <div class="tc-box"><div class="tcl">Estimé</div><div class="tcv"><input type="number" min="0" step="0.5" value="${estim || ''}" placeholder="0" onchange="updateField('estimationH', parseFloat(this.value) || null)"><small>h</small></div></div>
                                <div class="tc-box"><div class="tcl">Passé</div><div class="tcv"><input type="number" min="0" step="0.5" value="${passe || ''}" placeholder="0" onchange="updateField('tempsPasse', parseFloat(this.value) || null)"><small>h</small></div></div>
                            </div>
                            ${estim > 0 ? `<div class="tc-bar"><i class="${timeOver ? 'over' : ''}" style="width:${timePercent}%"></i></div><div class="tc-foot"><span>${Math.round((passe/estim)*100)}% consommé</span><span>reste ${Math.max(estim-passe,0)} h</span></div>` : ''}
                            ${(data.assignees.length && TASK_COLS.has('charges')) ? `<div style="margin-top:13px"><div class="prop-label" style="margin-bottom:6px">Charge par personne</div>${data.assignees.map(id => `<div class="charge-row"><span class="an">${escapeHtml(getTeamMemberName(id))}</span><input type="number" min="0" step="0.5" value="${chargeOf(id)}" onchange="updateCharge(${id}, this.value)"><span style="font-size:0.75rem;color:var(--text-muted)">h</span></div>`).join('')}<div style="margin-top:6px;font-size:0.78rem;color:var(--text-muted)">Total : <strong>${chargeTotalH}</strong> h</div></div>` : ''}${chargeConsolHtml}
                        </div>
                    </div>` : ''}
                    ${data.type === 'tache' ? `
                    <div class="prop-row pr-prog">
                        <span class="prop-label">Progression</span>
                        <div class="prop-value">
                            <div class="progress-inline-wrap">
                                <div class="progress-bar-mini"><div class="progress-bar-mini-fill" id="progressBarFill" style="width:${data.progression}%"></div></div>
                                <span class="progress-pct-label" id="progressValue">${data.progression}%</span>
                            </div>
                            <input type="range" class="progress-slider" min="0" max="100" value="${data.progression}" oninput="document.getElementById('progressValue').textContent=this.value+'%';document.getElementById('progressBarFill').style.width=this.value+'%'" onchange="updateField('progression', parseInt(this.value))">
                            <div class="progress-presets">
                                <div class="progress-preset ${data.progression === 0 ? 'active' : ''}" onclick="setProgressPreset(0)">0%</div>
                                <div class="progress-preset ${data.progression === 25 ? 'active' : ''}" onclick="setProgressPreset(25)">25%</div>
                                <div class="progress-preset ${data.progression === 50 ? 'active' : ''}" onclick="setProgressPreset(50)">50%</div>
                                <div class="progress-preset ${data.progression === 75 ? 'active' : ''}" onclick="setProgressPreset(75)">75%</div>
                                <div class="progress-preset ${data.progression === 100 ? 'active' : ''}" onclick="setProgressPreset(100)">100%</div>
                            </div>
                        </div>
                    </div>` : ''}
                </div>

                <!-- Description / Ordre du jour / Critères -->
                <div class="panel-section">
                    <div class="panel-section-header"><span class="panel-section-title">${descLabel}</span></div>
                    <div class="form-group"><textarea class="form-textarea" placeholder="${descLabel}..." oninput="updateField('description', this.value, true)">${escapeHtml(data.description)}</textarea></div>
                </div>

                <!-- WBS-03: Sous-tâches (hiérarchie) — vraies tâches avec parentTask -->
                ${!panelState.isNew ? (function() {
                    const kids = getChildren(panelState.taskId);
                    const _par = data.parentTask ? tasks.find(x => x.id === data.parentTask) : null;
                    const parentLink = _par ? '<div class="prereq-item" onclick="openTaskPanel(' + _par.id + ')" title="Ouvrir la tâche parent"><span style="flex-shrink:0;font-weight:700;color:var(--primary)">↑</span><span class="prereq-item-title">Parent : ' + escapeHtml(_par.titre) + '</span></div>' : '';
                    const kidsList = kids.map(k => {
                        const kp = getPriority(k);
                        const kprog = hasChildren(k) ? aggregateProgress(k) : (k.progression || 0);
                        return `<div class="prereq-item" onclick="openTaskPanel(${k.id})">
                            <span class="card-project" style="width:3px;height:16px;border-radius:2px;flex-shrink:0;background:${PRIORITY_COLORS[kp]}"></span>
                            <span class="prereq-item-title">${escapeHtml(k.titre)}</span>
                            <span class="prereq-badge ${k.statut || 'todo'}">${kprog}%</span>
                        </div>`;
                    }).join('');
                    return `<div class="panel-section">
                        <div class="panel-section-header"><span class="panel-section-title">Sous-tâches (hiérarchie)</span>${kids.length ? `<span class="panel-section-badge">${kids.length}</span>` : ''}</div>
                        ${parentLink}
                        ${kids.length ? `<div class="prereq-list">${kidsList}</div>` : `<div class="prereq-empty">Aucune sous-tâche. Décomposez cette tâche en étapes planifiables.</div>`}
                        <button class="panel-btn" style="width:auto;padding:6px 12px;font-size:0.78rem;margin-top:6px" onclick="openCreateTaskWithParent(${panelState.taskId})">+ Sous-tâche</button>
                    </div>`;
                })() : ''}

                <!-- Prérequis (jalon) ou Checklist (tâche/réunion) -->
                ${data.type === 'jalon' ? `
                <div class="panel-section">
                    <div class="panel-section-header"><span class="panel-section-title">Prérequis</span>${data.dependDe.length ? `<span class="panel-section-badge">${doneCount}/${data.dependDe.length}</span>` : ''}</div>
                    <div class="prereq-list">${prereqHtml || '<div class="prereq-empty">Aucune dépendance — liez des tâches amont via le panneau Dépendances d\'une tâche.</div>'}</div>
                </div>
                ` : `
                <div class="panel-section">
                    <div class="panel-section-header"><span class="panel-section-title">${data.type === 'reunion' ? 'Points à traiter' : 'Checklist'}</span>${subtasksTotal > 0 ? `<span class="panel-section-badge">${subtasksDone}/${subtasksTotal}</span>` : ''}</div>
                    <div class="subtask-list">${(data.subtasks || []).map(st => `<div class="subtask-item ${st.done ? 'done' : ''}"><input type="checkbox" class="subtask-checkbox" ${st.done ? 'checked' : ''} onchange="toggleSubtask(${st.id})"><input class="subtask-text" value="${escapeHtml(st.text)}" onchange="editSubtask(${st.id}, this.value)" onkeydown="if(event.key==='Enter')this.blur()"><button class="subtask-remove" onclick="removeSubtask(${st.id})">×</button></div>`).join('')}</div>
                    <div class="subtask-add"><input type="text" id="newSubtaskInput" placeholder="Ajouter..." onkeydown="handleSubtaskKeydown(event)"><button onclick="addSubtask()">+</button></div>
                </div>
                `}

                <!-- Détails : temps + tags + dépendances (hors jalon) -->
                ${data.type !== 'jalon' ? `
                <div class="panel-section">
                    <div class="panel-section-header"><span class="panel-section-title">Détails</span></div>
                    <div class="form-group"><div class="tags-input" onclick="document.getElementById('tagInput').focus()">${tagsChips}<input type="text" id="tagInput" placeholder="${data.tags.length ? '' : 'Ajouter un tag...'}" onkeydown="handleTagKeydown(event)"></div></div>
                    ${data.type !== 'reunion' ? `
                    <div class="form-group"><div class="multi-select" id="depsSelect"><div class="multi-select-trigger" onclick="toggleMultiSelect('depsSelect')"><div class="multi-select-values">${depsChips || '<span class="multi-select-placeholder">Dépendances...</span>'}</div><span class="multi-select-arrow">▾</span></div><div class="multi-select-dropdown">${depsOptions || '<div class="multi-select-empty">Aucune</div>'}</div></div>${blockedHtml}</div>

            footer.innerHTML = panelState.isNew

                : `<div class="panel-footer-left"><button class="panel-btn danger" onclick="showDeleteConfirm()" style="width:auto;padding:10px 14px">Suppr.</button></div><div class="panel-footer-right"><div class="delete-confirm" id="deleteConfirm" style="display:none;position:fixed;bottom:60px;right:16px;background:#fef2f2;border:1px solid var(--danger);border-radius:8px;padding:10px;z-index:100"><span style="font-size:0.8rem;margin-right:8px">Supprimer ?</span><button class="panel-btn" style="width:auto;padding:6px 12px;font-size:0.75rem" onclick="hideDeleteConfirm()">Non</button><button class="panel-btn" style="width:auto;padding:6px 12px;font-size:0.75rem;background:var(--danger);margin-left:4px" onclick="confirmDelete()">Oui</button></div></div>`;

        // ═══════════════════════════════════════════════════════════════════════
        // FIELD HANDLERS
        // ═══════════════════════════════════════════════════════════════════════
        function updateField(field, value, noSave = false) {
            const data = panelState.editData;
            if (!data) return;
            // BUG-01 FIX: Utiliser parseInputDate pour éviter problèmes de timezone
            if (field === 'dateDebut' || field === 'dateEcheance') value = value ? dateToGrist(parseInputDate(value)) : null;
            // dateCloture auto : posee quand on passe au statut terminal, effacee si on rouvre
            if (field === 'statut') { const _wasT = TF.isTerminal(statusCfg, data.statut), _nowT = TF.isTerminal(statusCfg, value); if (_nowT && !_wasT) data.dateCloture = Math.floor(Date.now() / 1000); else if (!_nowT && _wasT) data.dateCloture = null; }
            data[field] = value;
            if (field === 'type' && value === 'jalon' && data.dateDebut) data.dateEcheance = data.dateDebut;
            
            // Synchroniser le task local pour affichage immédiat
            syncLocalTask();
            
            const visualFields = ['type', 'priorite', 'statut', 'projet', 'progression', 'couleur', 'parentTask'];
            if (visualFields.includes(field)) { renderPanelTask(); if (!panelState.isNew) render(); }
            if (field === 'titre' && panelState.isNew) { const btn = document.querySelector('.panel-footer .panel-btn.success'); if (btn) btn.disabled = !value || !value.trim(); }
            if (!panelState.isNew && !noSave && gristReady) saveTaskToGrist();
        }

        function setProgressPreset(value) {
            const data = panelState.editData;
            if (!data) return;
            data.progression = value;
            syncLocalTask();  // FIX: Synchroniser le task local

            const slider = document.querySelector('.progress-slider');
            const valueSpan = document.getElementById('progressValue');
            const barFill = document.getElementById('progressBarFill');
            if (slider) slider.value = value;
            if (valueSpan) valueSpan.textContent = value + '%';
            if (barFill) barFill.style.width = value + '%';
            document.querySelectorAll('.progress-preset').forEach(btn => btn.classList.toggle('active', parseInt(btn.textContent) === value));
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            render();
        }

        function setTodayDate() {
            const data = panelState.editData;
            if (!data) return;
            const today = dateToGrist(new Date());
            data.dateDebut = today;
            if (data.type === 'jalon') data.dateEcheance = today;
            syncLocalTask();
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }

        // KAN-03: Clic direct sur barre de progression
        async function setCardProgress(e, taskId) {
            const rect = e.currentTarget.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = Math.round((clickX / rect.width) * 100);
            const roundedPercent = Math.round(percent / 5) * 5;  // Arrondir à 5%
            const clampedPercent = Math.max(0, Math.min(100, roundedPercent));
            
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            task.progression = clampedPercent;
            if (task.progression === 100 && !TF.isTerminal(statusCfg, task.statut)) task.statut = statusCfg.terminalValue;
            
            if (gristReady) {
                try {
                    await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, { progression: clampedPercent, statut: task.statut }]]);
                    showToast(`${clampedPercent}%`, 'success');
                } catch (err) {
                    showToast('Erreur', 'error');
                }
            }
            render();
        }

        function toggleMultiSelect(id) { const el = document.getElementById(id); document.querySelectorAll('.multi-select').forEach(s => { if (s.id !== id) s.classList.remove('open'); }); el.classList.toggle('open'); }
        function toggleAssignee(id) { const data = panelState.editData; const idx = data.assignees.indexOf(id); if (idx === -1) data.assignees.push(id); else data.assignees.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); render(); }
        function removeAssignee(id) { const data = panelState.editData; const idx = data.assignees.indexOf(id); if (idx !== -1) { data.assignees.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); render(); } }
        function updateCharge(memberId, value) {
            const data = panelState.editData; if (!data) return;
            if (!Array.isArray(data.charges)) data.charges = [];
            const h = Math.max(0, Number(value) || 0);
            const existing = data.charges.find(c => c.teamId === memberId);
            if (existing) existing.heures = h; else data.charges.push({ teamId: memberId, heures: h });
            syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask();
        }
        function toggleDependency(id) { const data = panelState.editData; const idx = data.dependDe.indexOf(id); if (idx === -1) data.dependDe.push(id); else data.dependDe.splice(idx, 1); syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask(); }
