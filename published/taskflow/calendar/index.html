        }
        const showSaveIndicator = () => { const el = document.getElementById('saveIndicator'); el.classList.add('visible'); clearTimeout(saveTimeout); saveTimeout = setTimeout(() => el.classList.remove('visible'), 1500); };
        const escapeHtml = (t) => { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

        const gristToDate = (ts) => ts ? new Date(ts * 1000) : null;
        const dateToGrist = (d) => d ? Math.floor(d.getTime() / 1000) : null;
        // BUG-01 FIX: Parsing robuste des dates depuis input type="date"
        const parseInputDate = (str) => {
            if (!str) return null;
            const parts = str.split('-');
            if (parts.length !== 3) return null;
            const [y, m, d] = parts.map(Number);
            if (!y || !m || !d || isNaN(y) || isNaN(m) || isNaN(d)) return null;
            return new Date(y, m - 1, d, 12, 0, 0);
        };
        const formatDate = (d, f='short') => { if (!d) return ''; if (f === 'short') return d.getDate() + ' ' + MONTHS[d.getMonth()].substring(0,3).toLowerCase(); if (f === 'full') return DAYS_FULL[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()].toLowerCase(); if (f === 'iso') return d.toISOString().split('T')[0]; return d.toLocaleDateString('fr-FR'); };
        const isSameDay = (a, b) => a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
        const isToday = (d) => isSameDay(d, new Date());
        const isWeekend = (d) => { const w = d.getDay(); return w === 0 || w === 6; };
        const getWeekNumber = (d) => { const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); const n = t.getUTCDay() || 7; t.setUTCDate(t.getUTCDate() + 4 - n); const y = new Date(Date.UTC(t.getUTCFullYear(), 0, 1)); return Math.ceil((((t - y) / 86400000) + 1) / 7); };
        const getMonthStart = (d) => new Date(d.getFullYear(), d.getMonth(), 1);
        const getMonthEnd = (d) => new Date(d.getFullYear(), d.getMonth() + 1, 0);
        const getWeekStart = (d) => { const t = new Date(d); const w = t.getDay(); return new Date(t.setDate(t.getDate() - w + (w === 0 ? -6 : 1))); };
        const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
        const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const endOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23, 59, 59, 999);

        // Project/Team helpers
        const getProjectName = (id) => { const p = projects.find(x => x.id === id); return p?.nom || ''; };
        const getProjectColor = (id) => { const p = projects.find(x => x.id === id); return p?.couleur || '#64748b'; };
        const getTeamMemberName = (id) => { const m = team.find(x => x.id === id); return m?.nom || ''; };
        const getTeamMemberColor = (id) => { const m = team.find(x => x.id === id); return m?.couleur || '#3e5de7'; };  // TEAM-01
        const getInitials = (n) => n ? n.split(' ').map(x => x[0]).join('').toUpperCase().slice(0, 2) : '?';

        // RefList / ChoiceList helpers - STANDARDIZED
        const getRefListArray = (val) => {
            if (!val) return [];
            if (Array.isArray(val)) return val[0] === 'L' ? val.slice(1).map(Number).filter(n => !isNaN(n)) : val.map(Number).filter(n => !isNaN(n));
            return [];
        };
        const toGristRefList = (arr) => arr && arr.length ? ['L', ...arr] : null;
        
        const getChoiceListArray = (val) => {
            if (!val) return [];
            if (Array.isArray(val)) return val[0] === 'L' ? val.slice(1) : val;
            return [];
        };
        const toGristChoiceList = (arr) => arr && arr.length ? ['L', ...arr] : null;

        // Task field accessors
        const getAssignees = (t) => getRefListArray(t?.assignees);
        const getDependsOn = (t) => getRefListArray(t?.dependDe);
        const getTags = (t) => getChoiceListArray(t?.tags);
        const getPriority = (t) => (t?.priorite >= 1 && t?.priorite <= 4) ? parseInt(t.priorite) : 3;
        function getTaskColor(t) {
            if (t?.couleur && /^#[0-9a-f]{3,8}$/i.test(t.couleur)) return t.couleur;
            switch (colorMode) {
                case 'project': return t?.projet ? getProjectColor(t.projet) : '#94a3b8';
                case 'assignee': { const a = getAssignees(t); return a.length ? getTeamMemberColor(a[0]) : '#94a3b8'; }
                case 'status': return TF.getStatus(statusCfg, t?.statut || statusCfg.firstValue).fillColor;
                case 'priority':
                default: return PRIORITY_COLORS[getPriority(t)];
            }
        }
        function getTaskBarGradient(t) {
            const c = getTaskColor(t);
            return 'linear-gradient(135deg, ' + c + ', color-mix(in srgb, ' + c + ' 70%, white))';
        }

        // ═══════════════════════════════════════════════════════════════════════
        // WBS (hiérarchie sous-tâches) — API commune
        // ═══════════════════════════════════════════════════════════════════════
        let childrenByParent = new Map();
        function rebuildChildrenCache() {
            childrenByParent = new Map();
            const cycleIds = new Set();
            for (const t of tasks) {
                const seen = new Set([t.id]);
                let cur = t.parentTask ? tasks.find(x => x.id === t.parentTask) : null;
                let guard = 0;
                while (cur && guard++ < 128) {
                    if (seen.has(cur.id)) { cycleIds.add(t.id); break; }
                    seen.add(cur.id);
                    cur = cur.parentTask ? tasks.find(x => x.id === cur.parentTask) : null;
                }
            }
            if (cycleIds.size) console.warn('WBS: cycles detected on task ids:', [...cycleIds]);
            for (const t of tasks) {
                const pid = t.parentTask;
                if (pid && !isNaN(pid) && !cycleIds.has(t.id)) {
                    if (!childrenByParent.has(pid)) childrenByParent.set(pid, []);
                    childrenByParent.get(pid).push(t);
                }
            }
        }
        const isRoot = (t) => !t?.parentTask;
        const getParent = (t) => t?.parentTask ? tasks.find(x => x.id === t.parentTask) : null;
        const getChildren = (id) => childrenByParent.get(id) || [];
        const hasChildren = (t) => t && getChildren(t.id).length > 0;
        function getDepth(t) { let d = 0, cur = t, guard = 0; while (cur?.parentTask && guard++ < 32) { cur = tasks.find(x => x.id === cur.parentTask); d++; } return d; }
        function walkTree(roots, cb) {
            const stack = roots.map(r => ({ task: r, depth: 0 }));
            while (stack.length) {
                const { task, depth: d } = stack.shift();
                cb(task, d);
                const kids = getChildren(task.id);
                if (kids.length) for (let i = kids.length - 1; i >= 0; i--) stack.unshift({ task: kids[i], depth: d + 1 });
            }
        }
        function getAllDescendants(id, acc = [], visited = new Set()) {
            if (visited.has(id)) return acc;
            visited.add(id);
            for (const k of getChildren(id)) { acc.push(k); getAllDescendants(k.id, acc, visited); }
            return acc;
        }
        function canSetParent(taskId, newParent) {
            if (!newParent) return true;
            if (newParent === taskId) return false;
            let cur = tasks.find(x => x.id === newParent), guard = 0;
            while (cur && guard++ < 64) {
                if (cur.id === taskId) return false;
                cur = cur.parentTask ? tasks.find(x => x.id === cur.parentTask) : null;
            }
            return true;
        }
        function aggregateProgress(t, visited = new Set()) {
            if (visited.has(t.id)) return t.progression || 0;
            visited.add(t.id);
            const kids = getChildren(t.id);
            if (!kids.length) return t.progression || 0;
            const allWeighted = kids.every(k => k.estimationH && k.estimationH > 0);
            if (allWeighted) {
                const totalW = kids.reduce((s, k) => s + k.estimationH, 0);
                return Math.round(kids.reduce((s, k) => s + aggregateProgress(k, visited) * k.estimationH, 0) / totalW);
            }
            return Math.round(kids.reduce((s, k) => s + aggregateProgress(k, visited), 0) / kids.length);
        }
        function aggregateDates(t, visited = new Set()) {
            if (visited.has(t.id)) return { start: t.dateDebut, end: t.dateEcheance };
            visited.add(t.id);
            const kids = getChildren(t.id);
            if (!kids.length) return { start: t.dateDebut, end: t.dateEcheance };
            let minS = t.dateDebut, maxE = t.dateEcheance;
            for (const k of kids) {
                const sub = aggregateDates(k, visited);
                if (sub.start != null && (minS == null || sub.start < minS)) minS = sub.start;
                if (sub.end != null && (maxE == null || sub.end > maxE)) maxE = sub.end;
            }
            return { start: minS, end: maxE };
        }
        const getStatusInfo = (s) => ({ todo: { label: 'À faire', bg: 'rgba(255,255,255,0.18)' }, inprogress: { label: 'En cours', bg: 'rgba(255,200,50,0.28)' }, review: { label: 'En revue', bg: 'rgba(147,197,253,0.3)' }, done: { label: 'Terminé', bg: 'rgba(52,211,153,0.3)' } }[s] || { label: s || '', bg: 'rgba(255,255,255,0.18)' });

        // Dependency helpers - detect cycles
        function wouldCreateCycle(taskId, depId, visited = new Set()) {
            if (taskId === depId) return true;
            if (visited.has(depId)) return false;
            visited.add(depId);
            const depTask = tasks.find(t => t.id === depId);
            if (!depTask) return false;
            const depDeps = getDependsOn(depTask);
            return depDeps.some(d => wouldCreateCycle(taskId, d, visited));
        }
        
        function getAvailableDependencies(taskId) {
            return tasks.filter(t => t.id !== taskId && !wouldCreateCycle(taskId, t.id));
        }
        
        function getBlockedTasks(taskId) {
            return tasks.filter(t => getDependsOn(t).includes(taskId));
        }

        function convertGristToRecords(data) {
            if (!data || Array.isArray(data)) return data || [];
            const cols = Object.keys(data);
            if (!cols.length) return [];
            const n = data[cols[0]]?.length || 0;
            const records = [];
            for (let i = 0; i < n; i++) { const rec = {}; cols.forEach(k => { rec[k] = data[k][i]; }); records.push(rec); }
            return records;
        }

        function renderEventBars(ft, firstDate, _weeksHint) {
            const monthBody = document.querySelector('.month-body');
            if (!monthBody) return;
            const weekRows = monthBody.querySelectorAll('.month-week');
            const weeks = weekRows.length; // utilise le vrai nombre de rangées rendues

            // Collecter les tâches par semaine
            const tasksByWeek = [];
            for (let w = 0; w < weeks; w++) tasksByWeek.push([]);
            ft.forEach(t => {
                const s = gristToDate(t.dateDebut) || gristToDate(t.dateEcheance);
                const e = gristToDate(t.dateEcheance) || s;
                if (!s) return;
                const taskStart = startOfDay(s), taskEnd = endOfDay(e);
                for (let w = 0; w < weeks; w++) {
                    const wStart = addDays(firstDate, w * 7);
                    if (taskEnd >= wStart && taskStart <= endOfDay(addDays(wStart, 6)))
                        tasksByWeek[w].push({ task: t, start: taskStart, end: taskEnd });
                }
            });

            // Passe 1 : calculer les lanes max nécessaires par semaine (sans cutoff)
            const maxLanesPerWeek = tasksByWeek.map((tasks, w) => {
                const wStart = addDays(firstDate, w * 7);
                tasks.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
                const lns = [];
                tasks.forEach(({ start, end }) => {
                    const bs = Math.max(start.getTime(), wStart.getTime());
                    const be = Math.min(end.getTime(), addDays(wStart, 7).getTime() - 1);
                    const sd = Math.floor((bs - wStart.getTime()) / 86400000);
                    const ed = Math.floor((be - wStart.getTime()) / 86400000);
                    let lane = lns.findIndex(l => l <= sd);
                    if (lane === -1) { lane = lns.length; lns.push(0); }
                    lns[lane] = ed + 1;
                });
                return lns.length;
            });

            // Calculer les hauteurs proportionnelles par semaine
            const availableHeight = monthBody.clientHeight || weeks * 80;
            const HEADER_H = 32, MIN_LANE_H = 20, MAX_BAR_H = 72, MIN_ROW_H = HEADER_H + MIN_LANE_H;
            const weights = maxLanesPerWeek.map(n => Math.max(1, n));
            const totalWeight = weights.reduce((a, b) => a + b, 0);
            const rawHeights = weights.map(wt => Math.max(MIN_ROW_H, (wt / totalWeight) * availableHeight));
            const totalRaw = rawHeights.reduce((a, b) => a + b, 0);
            const heights = totalRaw > availableHeight
                ? rawHeights.map(h => Math.max(MIN_ROW_H, h * availableHeight / totalRaw))
                : rawHeights;

            // Lanes visibles : combien peuvent tenir avec hauteur minimale
            const visibleLanesPerRow = heights.map(h => Math.max(1, Math.floor((h - HEADER_H) / MIN_LANE_H)));

            // Appliquer les hauteurs aux lignes DOM
            weekRows.forEach((row, w) => {
                row.style.flex = 'none';
                row.style.height = Math.round(heights[w]) + 'px';
            });

            // Passe 2 : Rendu des barres avec chevrons (B) et cutoff dynamique (C)
            weekRows.forEach((row, w) => {
                const lanesContainer = document.createElement('div');
                lanesContainer.className = 'week-lanes-container';
                const weekStart = addDays(firstDate, w * 7);
                const weekEnd = addDays(weekStart, 7); // exclusif
                const maxVisible = visibleLanesPerRow[w];
                // laneH distribué sur les lanes réellement utilisées (pas le max théorique)
                const usedLanes = Math.max(1, Math.min(maxLanesPerWeek[w], maxVisible));
                const laneH = Math.floor((heights[w] - HEADER_H) / usedLanes);
                const barH = Math.min(MAX_BAR_H, Math.max(14, laneH - 4));
                const level = barH < 20 ? 'compact' : barH < 34 ? 'medium' : barH < 52 ? 'tall' : 'full';

                const lanes = [];
                let hiddenCount = 0;

                tasksByWeek[w].forEach(({ task, start, end }) => {
                    const barStart = Math.max(start.getTime(), weekStart.getTime());
                    const barEnd = Math.min(end.getTime(), weekEnd.getTime() - 1);
                    const startDay = Math.floor((barStart - weekStart.getTime()) / 86400000);
                    const endDay = Math.floor((barEnd - weekStart.getTime()) / 86400000);

                    let lane = lanes.findIndex(l => l <= startDay);
                    if (lane === -1) { lane = lanes.length; lanes.push(0); }
                    lanes[lane] = endDay + 1;

                    if (lane < maxVisible) {
                        const p = getPriority(task);
                        const top = HEADER_H + lane * laneH;
                        const continuedFromPrev = start < weekStart;
                        const continuesNext = end >= weekEnd;
                        const isMilestone = task.type === 'jalon';
                        const isDone = TF.isTerminal(statusCfg, task.statut);

                        const bar = document.createElement('div');
                        bar.className = ['event-bar', `p${p}`, `size-${level}`,
                            isMilestone ? 'milestone' : '',
                            isDone ? 'done' : '',
                            task.id === selectedTaskId ? 'selected' : '',
                            continuedFromPrev ? 'continued-left' : '',
                            continuesNext ? 'continues-right' : ''
                        ].filter(Boolean).join(' ');
                        const projectColor = task.projet ? getProjectColor(task.projet) : null;
                        bar.style.cssText = `left:${startDay / 7 * 100}%; width:${(endDay - startDay + 1) / 7 * 100}%; top:${top}px; height:${barH}px;${projectColor ? ` border-left-color:${projectColor};` : ''}`;
                        if (!isMilestone) bar.style.background = getTaskBarGradient(task);

                        buildBarContent(bar, task, level, continuedFromPrev, continuesNext, isMilestone);

                        bar.addEventListener('click', (e) => { e.stopPropagation(); openTaskPanel(task.id); });
                        lanesContainer.appendChild(bar);
                    } else {
                        hiddenCount++;
                    }
                });

                // C: +N overflow → naviguer vers vue semaine
                if (hiddenCount > 0) {
                    const more = document.createElement('div');
                    more.className = 'more-events';
                    more.textContent = `+${hiddenCount}`;
                    const capturedWeekStart = new Date(weekStart.getTime());
                    more.addEventListener('click', (e) => {
                        e.stopPropagation();
                        currentDate = capturedWeekStart;
                        setView('week');
                    });
                    const lastDay = row.querySelector('.month-day:last-child');
                    if (lastDay) lastDay.appendChild(more);
                }

                row.appendChild(lanesContainer);
            });
        }
        
        // Construit le contenu d'une barre adaptative selon son niveau de détail
        function buildBarContent(bar, task, level, continuedFromPrev, continuesNext, isMilestone) {
            const title = task.titre || 'Sans titre';

            if (isMilestone || level === 'compact') {
                // Layout horizontal : [◄] titre [►]
                if (continuedFromPrev) { const a = document.createElement('span'); a.className = 'bar-chevron bar-chevron-left'; a.textContent = '◄'; bar.appendChild(a); }
                const t = document.createElement('span'); t.className = 'eb-title'; t.textContent = title; bar.appendChild(t);
                if (continuesNext) { const a = document.createElement('span'); a.className = 'bar-chevron bar-chevron-right'; a.textContent = '►'; bar.appendChild(a); }
                return;
            }

            // Layout vertical pour medium / tall / full
            bar.style.padding = '3px 7px';

            // Ligne 1 : [◄] titre  [badge statut]  [►]
            const rowTop = document.createElement('div');
            rowTop.className = 'eb-row-top';
            if (continuedFromPrev) { const a = document.createElement('span'); a.className = 'bar-chevron bar-chevron-left'; a.textContent = '◄'; rowTop.appendChild(a); }
            const t = document.createElement('span'); t.className = 'eb-title'; t.textContent = title; rowTop.appendChild(t);
            const si = getStatusInfo(task.statut);
            const badge = document.createElement('span'); badge.className = 'eb-status'; badge.textContent = si.label; badge.style.background = si.bg; rowTop.appendChild(badge);
            if (continuesNext) { const a = document.createElement('span'); a.className = 'bar-chevron bar-chevron-right'; a.textContent = '►'; rowTop.appendChild(a); }
            bar.appendChild(rowTop);

            // Ligne 2 (full seulement) : plage de dates
            if (level === 'full') {
                const ds = gristToDate(task.dateDebut) || gristToDate(task.dateEcheance);
                const de = gristToDate(task.dateEcheance) || ds;
                if (ds) {
                    const rowDate = document.createElement('div');
                    rowDate.className = 'eb-row-date';
                    const dateStr = formatDate(ds, 'short') + (de && de.getTime() !== ds.getTime() ? ' → ' + formatDate(de, 'short') : '');
                    rowDate.textContent = dateStr;
                    bar.appendChild(rowDate);
                }
            }

            // Ligne avatars (tall + full)
            if (level === 'tall' || level === 'full') {
                const ids = getAssignees(task);
                if (ids.length > 0) {
                    const rowBottom = document.createElement('div');
                    rowBottom.className = 'eb-row-bottom';
                    const MAX_AV = 5;
                    ids.slice(0, MAX_AV).forEach(id => {
                        const name = getTeamMemberName(id);
                        const color = getTeamMemberColor(id);
                        const av = document.createElement('span');
                        av.className = 'eb-avatar';
                        av.textContent = name ? name.charAt(0).toUpperCase() : '?';
                        av.style.background = color + '55';
                        av.style.borderColor = color + '99';
                        av.title = name;
                        rowBottom.appendChild(av);
                    });
                    if (ids.length > MAX_AV) {
                        const ov = document.createElement('span');
                        ov.className = 'eb-avatar';
                        ov.textContent = '+' + (ids.length - MAX_AV);
                        ov.style.background = 'rgba(255,255,255,0.2)';
                        rowBottom.appendChild(ov);
                    }
                    bar.appendChild(rowBottom);
                }
            }
        }

        function renderWeekEventBars(containerId, ft, weekStart, numDays) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const periodEnd = addDays(weekStart, numDays);
            const tasksInPeriod = [];

            ft.forEach(t => {
                const s = gristToDate(t.dateDebut) || gristToDate(t.dateEcheance);
                const e = gristToDate(t.dateEcheance) || s;
                if (!s) return;
                const taskStart = startOfDay(s), taskEnd = endOfDay(e);
                if (taskEnd >= weekStart && taskStart < periodEnd)
                    tasksInPeriod.push({ task: t, start: taskStart, end: taskEnd });
            });

            tasksInPeriod.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));

            const lanes = [];
            const maxLanes = 3;

            tasksInPeriod.forEach(({ task, start, end }) => {
                const barStart = Math.max(start.getTime(), weekStart.getTime());
                const barEnd = Math.min(end.getTime(), periodEnd.getTime() - 1);
                const startDay = Math.floor((barStart - weekStart.getTime()) / 86400000);
                const endDay = Math.floor((barEnd - weekStart.getTime()) / 86400000);

                let lane = lanes.findIndex(l => l <= startDay);
                if (lane === -1) { lane = lanes.length; lanes.push(0); }
                lanes[lane] = endDay + 1;

                if (lane < maxLanes) {
                    const p = getPriority(task);
                    const isMilestone = task.type === 'jalon';
                    const isDone = TF.isTerminal(statusCfg, task.statut);
                    // B: Détecter continuation hors période
                    const continuedFromPrev = start < weekStart;
                    const continuesNext = end >= periodEnd;

                    const bar = document.createElement('div');
                    bar.className = ['week-event-bar', `p${p}`,
                        isMilestone ? 'milestone' : '',
                        isDone ? 'done' : '',
                        task.id === selectedTaskId ? 'selected' : '',
                        continuedFromPrev ? 'continued-left' : '',
                        continuesNext ? 'continues-right' : ''
                    ].filter(Boolean).join(' ');
                    const projectColor = task.projet ? getProjectColor(task.projet) : null;
                    bar.style.cssText = `left:${startDay / numDays * 100}%; width:${(endDay - startDay + 1) / numDays * 100}%; top:${lane * 22}px;${projectColor ? ` border-left-color:${projectColor};` : ''}`;
                    if (!isMilestone) bar.style.background = getTaskBarGradient(task);

                    // B: Chevrons de continuation
                    if (continuedFromPrev) {
                        const arrL = document.createElement('span');
                        arrL.className = 'bar-chevron bar-chevron-left';
                        arrL.textContent = '◄';
                        bar.appendChild(arrL);
                    }
                    const titleSpan = document.createElement('span');
                    titleSpan.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;';
                    titleSpan.textContent = task.titre || 'Sans titre';
                    bar.appendChild(titleSpan);
                    if (continuesNext) {
                        const arrR = document.createElement('span');
                        arrR.className = 'bar-chevron bar-chevron-right';
                        arrR.textContent = '►';
                        bar.appendChild(arrR);
                    }

                    bar.addEventListener('click', (e) => { e.stopPropagation(); openTaskPanel(task.id); });
                    container.appendChild(bar);
                }
            });
        }

                        const barStart = Math.max(start.getTime(), weekStart.getTime());
                        const barEnd = Math.min(end.getTime(), weekEnd.getTime());
                        const startDay = Math.floor((barStart - weekStart.getTime()) / 86400000);
                        const endDay = Math.floor((barEnd - weekStart.getTime()) / 86400000);
                        let lane = lanes.findIndex(l => l <= startDay);
                        if (lane === -1) { lane = lanes.length; lanes.push(0); }
                        lanes[lane] = endDay + 1;
                        if (lane < MAX_MINI_LANES) {
                            const bar = document.createElement('div');
                            bar.className = 'mini-event-bar';
                            const color = PRIORITY_COLORS[getPriority(task)] || '#64748b';
                            const continuedLeft = start < weekStart;
                            const continuesRight = end > weekEnd;
                            bar.style.cssText = `left:${startDay / 7 * 100}%; width:${(endDay - startDay + 1) / 7 * 100}%; top:${2 + lane * 7}px; background:${color}; height:5px; border-radius:${continuedLeft ? '0' : '2px'} ${continuesRight ? '0' : '2px'} ${continuesRight ? '0' : '2px'} ${continuedLeft ? '0' : '2px'};`;
                            bar.title = task.titre || 'Sans titre';
                            bar.addEventListener('click', (e) => { e.stopPropagation(); openTaskPanel(task.id); });
                            barsEl.appendChild(bar);
                        }
                    });
                    const usedLanes = Math.min(lanes.length, MAX_MINI_LANES);
                    if (usedLanes > 0) barsEl.style.height = (usedLanes * 7 + 4) + 'px';
                    weekWrapper.appendChild(barsEl);
                    gridEl.appendChild(weekWrapper);
                }

                miniMonth.appendChild(gridEl);
                grid.appendChild(miniMonth);
            }
        }

        }
        
        function openDayPanel(date) {
            selectedDate = date;
            const ft = getFilteredTasks().filter(t => {
                const s = gristToDate(t.dateDebut), e = gristToDate(t.dateEcheance) || s;
                return s && startOfDay(s) <= date && endOfDay(e || s) >= date;
            });
            panelState = { open: true, mode: 'period', periodType: 'day', periodDate: date, periodTasks: ft, taskId: null, taskIndex: -1, isNew: false, editData: null };

            openPanel();
            render();
        }
        
        function openWeekPanel(date) {
            const weekStart = getWeekStart(date);
            const weekEnd = addDays(weekStart, 6);
            const ft = getFilteredTasks().filter(t => {
                const s = gristToDate(t.dateDebut), e = gristToDate(t.dateEcheance) || s;
                return s && startOfDay(s) <= weekEnd && endOfDay(e || s) >= weekStart;

            panelState = { open: true, mode: 'period', periodType: 'week', periodDate: weekStart, periodTasks: ft, taskId: null, taskIndex: -1, isNew: false, editData: null };

            panelState.taskId = taskId;
            panelState.taskIndex = idx >= 0 ? idx : 0;

            panelState.editData = cloneTaskData(task);

        function detachFromParent() { updateField('parentTask', null); }
        async function adjustParentDatesToChildren() {
            const t = tasks.find(x => x.id === panelState.taskId);
            if (!t || !hasChildren(t)) return;
            const kids = getAllDescendants(t.id);
            let minS = null, maxE = null;
            for (const k of kids) {
                if (k.dateDebut != null && (minS == null || k.dateDebut < minS)) minS = k.dateDebut;
                if (k.dateEcheance != null && (maxE == null || k.dateEcheance > maxE)) maxE = k.dateEcheance;
            }
            if (minS == null || maxE == null) { showToast('Aucun descendant avec dates', 'info'); return; }
            t.dateDebut = minS; t.dateEcheance = maxE;
            if (panelState.editData) { panelState.editData.dateDebut = minS; panelState.editData.dateEcheance = maxE; }
            if (gristReady) {
                try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', t.id, { dateDebut: minS, dateEcheance: maxE }]]); showSaveIndicator(); }
                catch (e) { showToast('Erreur ajustement', 'error'); }
            }
            renderPanelTask(); render();
        }
        function setParent(newParentId) {
            if (panelState.taskId && !canSetParent(panelState.taskId, newParentId)) {
                showToast('Cycle détecté — choix impossible', 'error');
                return;
            }
            updateField('parentTask', newParentId);
        }

            if (panelState.isNew || !panelState.taskId) return;

            if (panelState.isNew && panelState.editData?.titre?.trim()) {

                    return `<div class="panel-section">
                        <div class="panel-section-header"><span class="panel-section-title">Sous-tâches (hiérarchie)</span>${kids.length ? `<span class="panel-section-badge">${kids.length}</span>` : ''}</div>

                        <button class="panel-btn" style="width:auto;padding:6px 12px;font-size:0.78rem;margin-top:6px;margin-right:6px" onclick="openCreateTaskWithParent(${panelState.taskId})">+ Sous-tâche</button>${kids.length ? `<button class="btn" style="padding:6px 12px;font-size:0.78rem;margin-top:6px" onclick="adjustParentDatesToChildren()" title="Aligner les dates du parent sur min/max des descendants">↔ Ajuster dates</button>` : ''}

                <!-- Prérequis (jalon) ou Checklist (tâche/réunion) -->
                ${data.type === 'jalon' ? `
                <div class="panel-section">

                ` : `
                <div class="panel-section">
                    <div class="panel-section-header"><span class="panel-section-title">${data.type === 'reunion' ? 'Points à traiter' : 'Checklist'}</span>${subtasksTotal > 0 ? `<span class="panel-section-badge">${subtasksDone}/${subtasksTotal}</span>` : ''}</div>
                    <div class="subtask-list">${(data.subtasks || []).map(st => `<div class="subtask-item ${st.done ? 'done' : ''}"><input type="checkbox" class="subtask-checkbox" ${st.done ? 'checked' : ''} onchange="toggleSubtask(${st.id})"><span class="subtask-text">${escapeHtml(st.text)}</span><button class="subtask-remove" onclick="removeSubtask(${st.id})">×</button></div>`).join('')}</div>
                    <div class="subtask-add"><input type="text" id="newSubtaskInput" placeholder="Ajouter..." onkeydown="handleSubtaskKeydown(event)"><button onclick="addSubtask()">+</button></div>
                </div>

                <!-- Détails : temps + tags + dépendances (hors jalon) -->
                ${data.type !== 'jalon' ? `
                <div class="panel-section">
                    <div class="panel-section-header"><span class="panel-section-title">Détails</span></div>
                    <div class="form-group"><div class="tags-input" onclick="document.getElementById('tagInput').focus()">${tagsChips}<input type="text" id="tagInput" placeholder="${data.tags.length ? '' : 'Ajouter un tag...'}" onkeydown="handleTagKeydown(event)"></div></div>
                    ${data.type !== 'reunion' ? `
                    <div class="form-group"><div class="multi-select" id="depsSelect"><div class="multi-select-trigger" onclick="toggleMultiSelect('depsSelect')"><div class="multi-select-values">${depsChips || '<span class="multi-select-placeholder">Dépendances...</span>'}</div><span class="multi-select-arrow">▾</span></div><div class="multi-select-dropdown">${depsOptions || '<div class="multi-select-empty">Aucune</div>'}</div></div>${blockedHtml}</div>
                    ` : ''}

                ` : ''}

                ${!panelState.isNew ? `<div class="panel-footer-left"><button class="panel-btn danger" onclick="showDeleteConfirm()" style="width:auto;padding:10px 14px">Suppr.</button></div><div class="delete-confirm" id="deleteConfirm"><div class="delete-confirm-text">Supprimer ?</div><div class="delete-confirm-actions"><button class="delete-confirm-btn cancel" onclick="hideDeleteConfirm()">Annuler</button><button class="delete-confirm-btn confirm" onclick="confirmDelete()">Supprimer</button></div></div>` : ''}
            `;

            // Footer
            if (panelState.isNew) {
                const canCreate = data.titre && data.titre.trim().length > 0;
                footer.innerHTML = `<div style="display:flex;gap:8px;width:100%"><button class="panel-btn" style="flex:0 0 auto;width:auto;padding:10px 16px;background:transparent;color:var(--text-muted);border:1px solid var(--border)" onclick="closePanel()">Annuler</button><button class="panel-btn success" onclick="createTask()" ${!canCreate ? 'disabled' : ''} style="flex:1;width:auto">Créer la tâche</button></div>`;

        // ═══════════════════════════════════════════════════════════════════════
        // FIELD UPDATES & HANDLERS
        // ═══════════════════════════════════════════════════════════════════════
        function updateCharge(memberId, value) {
            const data = panelState.editData; if (!data) return;
            if (!Array.isArray(data.charges)) data.charges = [];
            const h = Math.max(0, Number(value) || 0);
            const existing = data.charges.find(c => c.teamId === memberId);
            if (existing) existing.heures = h; else data.charges.push({ teamId: memberId, heures: h });
            syncLocalTask(); if (!panelState.isNew && gristReady) saveTaskToGrist(); renderPanelTask();
        }
        function updateField(field, value, noSave = false) {
            const data = panelState.editData;
            if (!data) return;
            
            // BUG-01 FIX: Convert date strings to Grist timestamps using robust parsing
            if (field === 'dateDebut' || field === 'dateEcheance') {
                value = value ? dateToGrist(parseInputDate(value)) : null;
            }
            // dateCloture auto : posee au statut terminal, effacee si reouverture
            if (field === 'statut') { const _wasT = TF.isTerminal(statusCfg, data.statut), _nowT = TF.isTerminal(statusCfg, value); if (_nowT && !_wasT) data.dateCloture = Math.floor(Date.now() / 1000); else if (!_nowT && _wasT) data.dateCloture = null; }
            
            data[field] = value;
            
            // Jalon: sync dates
            if (field === 'type' && value === 'jalon' && data.dateDebut) {
                data.dateEcheance = data.dateDebut;
            }
            
            // FIX: Synchroniser le task local pour affichage immédiat
            syncLocalTask();
            
            // Visual fields requiring re-render
            const visualFields = ['type', 'priorite', 'statut', 'projet', 'progression', 'dateDebut', 'dateEcheance', 'couleur', 'parentTask'];
            if (visualFields.includes(field)) {
                renderPanelTask();
                if (!panelState.isNew) render();
            }
            
            // Enable/disable create button
            if (field === 'titre' && panelState.isNew) {
                const btn = document.querySelector('.panel-footer .panel-btn.success');
                if (btn) btn.disabled = !value || !value.trim();
            }
            
            // Auto-save for existing tasks
            if (!panelState.isNew && !noSave && gristReady) {
                saveTaskToGrist();
            }
        }

        function setProgressPreset(value) {
            const data = panelState.editData;
            if (!data) return;
            data.progression = value;
            syncLocalTask();

            const slider = document.querySelector('.progress-slider');
            const valueSpan = document.getElementById('progressValue');
            const barFill = document.getElementById('progressBarFill');
            if (slider) slider.value = value;
            if (valueSpan) valueSpan.textContent = value + '%';
            if (barFill) barFill.style.width = value + '%';
            document.querySelectorAll('.progress-preset').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.textContent) === value);
            });
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            render();
        }

        function setTodayDate() {
            const data = panelState.editData;
            if (!data) return;
            const today = dateToGrist(new Date());
            data.dateDebut = today;
            if (data.type === 'jalon') data.dateEcheance = today;
            syncLocalTask();
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }

        // Subtasks/Checklist
        function getSubtasks(task) {
            if (!task?.subtasks) return [];
            try { return JSON.parse(task.subtasks); } catch (e) { return []; }
        }
        function subtasksToJson(subtasks) {
            return JSON.stringify(subtasks || []);
        }
        function addSubtask() {
            const input = document.getElementById('newSubtaskInput');
            const text = input?.value?.trim();
            if (!text) return;
            const data = panelState.editData;
            if (!data.subtasks) data.subtasks = [];
            data.subtasks.push({ id: Date.now(), text: text, done: false });
            input.value = '';
            updateSubtaskProgress();
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }
        function toggleSubtask(id) {
            const data = panelState.editData;
            if (!data.subtasks) return;
            const st = data.subtasks.find(s => s.id === id);
            if (st) {
                st.done = !st.done;
                updateSubtaskProgress();
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
                render();
            }
        }
        function removeSubtask(id) {
            const data = panelState.editData;
            if (!data.subtasks) return;
            const idx = data.subtasks.findIndex(s => s.id === id);
            if (idx !== -1) {
                data.subtasks.splice(idx, 1);
                updateSubtaskProgress();
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
                render();
            }
        }
        function updateSubtaskProgress() {
            const data = panelState.editData;
            if (!data.subtasks || data.subtasks.length === 0) return;
            const done = data.subtasks.filter(s => s.done).length;
            const total = data.subtasks.length;
            data.progression = Math.round((done / total) * 100);
            syncLocalTask();
        }
        function handleSubtaskKeydown(e) {
            if (e.key === 'Enter') { e.preventDefault(); addSubtask(); }
        }

        function toggleMultiSelect(id) {
            const el = document.getElementById(id);
            document.querySelectorAll('.multi-select').forEach(s => { if (s.id !== id) s.classList.remove('open'); });
            el.classList.toggle('open');
        }
        
        function toggleAssignee(id) {
            const data = panelState.editData;
            const idx = data.assignees.indexOf(id);
            if (idx === -1) data.assignees.push(id);
            else data.assignees.splice(idx, 1);
            syncLocalTask();  // FIX
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }
        
        function removeAssignee(id) {
            const data = panelState.editData;
            const idx = data.assignees.indexOf(id);
            if (idx !== -1) {
                data.assignees.splice(idx, 1);
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
                render();
            }
        }
        
        function toggleDependency(id) {
            const data = panelState.editData;
            const idx = data.dependDe.indexOf(id);
            if (idx === -1) data.dependDe.push(id);
            else data.dependDe.splice(idx, 1);
            syncLocalTask();  // FIX
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
        }
        
        function removeDependency(id) {
            const data = panelState.editData;
            const idx = data.dependDe.indexOf(id);
            if (idx !== -1) {
                data.dependDe.splice(idx, 1);
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
            }
        }
        
        function handleTagKeydown(e) {
            const data = panelState.editData;
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const tag = e.target.value.trim().replace(/^#/, '');
                if (tag && !data.tags.includes(tag)) {
                    data.tags.push(tag);
                    e.target.value = '';
                    syncLocalTask();  // FIX
                    if (!panelState.isNew && gristReady) saveTaskToGrist();
                    renderPanelTask();
                }
            } else if (e.key === 'Backspace' && !e.target.value && data.tags.length) {
                data.tags.pop();
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
            }
        }
        
        function removeTag(tag) {
            const data = panelState.editData;
            const idx = data.tags.indexOf(tag);
            if (idx !== -1) {
                data.tags.splice(idx, 1);
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
            }
        }
        
        function showDeleteConfirm() { document.getElementById('deleteConfirm').classList.add('visible'); }
        function hideDeleteConfirm() { document.getElementById('deleteConfirm').classList.remove('visible'); }

        // ═══════════════════════════════════════════════════════════════════════
        // CRUD OPERATIONS
        // ═══════════════════════════════════════════════════════════════════════
        async function saveTaskToGrist() {
            const data = panelState.editData;
            if (!data || panelState.isNew || !gristReady) return;
            if (data.dateDebut && data.dateEcheance && data.dateDebut > data.dateEcheance) {
                showToast('La date de début ne peut pas dépasser la date de fin', 'error');
                return;
            }

            const record = {
                titre: data.titre,
                description: data.description,
                type: data.type,
                priorite: data.priorite,
                statut: data.statut,
                progression: data.progression,
                dateDebut: data.dateDebut,
                dateEcheance: data.dateEcheance,
                projet: data.projet,
                assignees: toGristRefList(data.assignees),
                dependDe: toGristRefList(data.dependDe),
                tags: toGristChoiceList(data.tags),
                estimationH: data.estimationH,
                tempsPasse: data.tempsPasse,
                subtasks: subtasksToJson(data.subtasks),
                couleur: data.couleur || null,
                parentTask: data.parentTask || null,
                charges: TF.chargesToJson((data.charges || []).filter(c => data.assignees.includes(c.teamId))), dateCloture: data.dateCloture || null
            };

            try {
                await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', panelState.taskId, pruneTaskRecord(record)]]);
                showSaveIndicator();
            } catch (e) {
                showToast('Erreur de sauvegarde', 'error');
            }
        }
        
        async function createTask() {
            const data = panelState.editData;
            if (!data || !data.titre || !data.titre.trim()) {
                showToast('Le titre est requis', 'error');
                return;
            }
            if (data.dateDebut && data.dateEcheance && data.dateDebut > data.dateEcheance) {
                showToast('La date de début ne peut pas dépasser la date de fin', 'error');
                return;
            }

            const record = {
                titre: data.titre,
                description: data.description || '',
                type: data.type || 'tache',
                priorite: data.priorite || '3',
                statut: data.statut || 'todo',
                progression: data.progression || 0,
                dateDebut: data.dateDebut,
                dateEcheance: data.dateEcheance,
                projet: data.projet,
                assignees: toGristRefList(data.assignees),
                dependDe: toGristRefList(data.dependDe),
                tags: toGristChoiceList(data.tags),
                estimationH: data.estimationH,
                tempsPasse: data.tempsPasse,
                subtasks: subtasksToJson(data.subtasks),
                couleur: data.couleur || null,
                parentTask: data.parentTask || null,
                charges: TF.chargesToJson((data.charges || []).filter(c => data.assignees.includes(c.teamId))), dateCloture: data.dateCloture || null
            };

            if (gristReady) {
                try {
                    await grist.docApi.applyUserActions([['AddRecord', 'Tasks', null, pruneTaskRecord(record)]]);
                    showToast('Tâche créée', 'success');
                    await loadAllData();
                    backToPeriod();
                } catch (e) {
                    showToast('Erreur de création', 'error');
                }
            } else {
                record.id = Date.now();
                tasks.push(record);
                showToast('Tâche créée', 'success');
                render();
                backToPeriod();
            }
        }
        
        async function confirmDelete() {
            if (panelState.isNew || !panelState.taskId) return;
            
            if (gristReady) {
                try {
                    await grist.docApi.applyUserActions([['RemoveRecord', 'Tasks', panelState.taskId]]);
                    showToast('Tâche supprimée', 'success');
                    await loadAllData();
                    backToPeriod();
                } catch (e) {
                    showToast('Erreur de suppression', 'error');
                }
            } else {
                tasks = tasks.filter(t => t.id !== panelState.taskId);

        // ═══════════════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════════════
        async function initGrist() {
            // Phase 1 : tenter grist.ready — si Grist absent, basculer en démo
            try {
                await grist.ready({ requiredAccess: 'full' });
            } catch (e) {
                console.log('Grist unavailable, using demo:', e);
                useDemoMode();
                return;
            }
            // Phase 2 : ici on est dans Grist. Toute erreur est logguée mais ne bascule PAS en démo.
            try { await ensureSchema(); } catch (e) { console.error('ensureSchema error (continuing):', e); showToast('Schéma: ' + (e?.message || e), 'error'); }
            try { await loadAllData(); } catch (e) { console.error('loadAllData error (continuing):', e); showToast('Chargement: ' + (e?.message || e), 'error'); }
            try {
                grist.onRecords(async () => await loadAllData());
                grist.onRecord((rec) => {
                    if (rec?.id && rec.id !== selectedTaskId) { selectedTaskId = rec.id; render(); }
                });
                grist.onOptions((options, interaction) => {
                    if (options?.filters && interaction?.source !== 'self') {
                        const f = options.filters;
                        filters.project = Array.isArray(f.project) ? f.project : [];
                        filters.priority = Array.isArray(f.priority) ? f.priority : [];
                        filters.assignee = Array.isArray(f.assignee) ? f.assignee : [];
                        updateFilterMenus();
                        render();
                    }
                });
            } catch (e) { console.error('Grist listeners error:', e); }
        }

            }
