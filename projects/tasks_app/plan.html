<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan - TaskFlow</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
:root{
  --bg:#0f172a; --surface:#1e293b; --surface-2:#243044; --surface-3:#2c3a52;
  --border:#334155; --text:#e2e8f0; --text-muted:#94a3b8; --primary:#6366f1;
  --ok:#3b82f6; --warn:#f59e0b; --over:#e5484d; --off:#475569; --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
.bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.title{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:700;color:var(--primary)}
.title .ic{font-size:1.2rem}
.spacer{flex:1}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.seg button{background:transparent;color:var(--text-muted);border:0;padding:5px 11px;cursor:pointer;font-size:0.82rem}
.seg button.on{background:var(--primary);color:#fff}
.btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 10px;cursor:pointer;font-size:0.82rem}
.btn:hover{background:var(--surface-3)}
.btn.ghost{background:transparent;color:var(--text-muted)}
.nav{display:inline-flex;align-items:center;gap:6px}
.nav .range{font-size:0.82rem;color:var(--text-muted);min-width:104px;text-align:center}
select.btn{appearance:none;padding-right:24px}
label.chk{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text-muted);cursor:pointer}
.alerts{padding:7px 14px;font-size:0.78rem;color:var(--text-muted);border-bottom:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap}
.alerts .warn{color:var(--warn)} .alerts .over{color:var(--over)}
.gridwrap{flex:1;overflow:auto;position:relative}
:root{--res-col:184px;--sum-col:80px}
table.grid{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;font-size:0.8rem}
table.grid th,table.grid td{padding:0;border-bottom:1px solid var(--border)}
table.grid thead th{position:sticky;top:0;z-index:3;background:var(--surface);color:var(--text-muted);font-weight:600;padding:8px 8px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
table.grid thead th.now{color:var(--primary)}
.colres{position:sticky;left:0;z-index:2;background:var(--surface);text-align:left!important;width:var(--res-col);min-width:var(--res-col);border-right:1px solid var(--border)}
thead th.colres{z-index:4}
.res{display:flex;align-items:center;gap:8px;padding:7px 10px}
.ava{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.66rem;font-weight:700;color:#fff;flex-shrink:0}
.res .nm{font-weight:600;white-space:nowrap}
.res .cap{color:var(--text-muted);font-size:0.72rem}
.cell{text-align:center;padding:0;cursor:pointer}
.cell .v{display:block;padding:6px 4px;font-weight:600;font-size:0.78rem;color:#fff;min-width:0}
.cell .dot{display:block;padding:6px 8px;color:var(--off)}
.cell:hover .v{outline:2px solid rgba(255,255,255,.45);outline-offset:-2px}
.cell.nowcol,thead th.now,tfoot td.nowcol{box-shadow:inset 1px 0 var(--primary),inset -1px 0 var(--primary)}
thead th .pk{font-weight:700}
thead th .psub{font-weight:400;font-size:0.65rem;color:var(--off);margin-top:1px}
th.sum,td.sum{text-align:center;background:var(--surface-2);border-left:1px solid var(--border);white-space:nowrap;padding:6px 8px;width:var(--sum-col)}
td.sum .sh{font-weight:700;font-size:0.8rem}
td.sum .sp{font-size:0.67rem;color:var(--text-muted)}
tfoot td{position:sticky;bottom:0;background:var(--surface-2);font-weight:600;color:var(--text);padding:7px 6px;text-align:center;border-top:1px solid var(--border)}
tfoot td.colres{background:var(--surface-2);z-index:2}
.legend{padding:8px 14px;display:flex;gap:16px;flex-wrap:wrap;font-size:0.74rem;color:var(--text-muted);border-top:1px solid var(--border)}
.legend .sw{display:inline-block;width:11px;height:11px;border-radius:2px;vertical-align:middle;margin-right:4px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%;color:var(--text-muted);text-align:center}
.empty .ic{font-size:2.4rem;opacity:.5}
/* panel slide-in (même primitive que les autres widgets) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:20}
.overlay.show{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:.22s;z-index:21;display:flex;flex-direction:column}
.panel.show{transform:none}
.panel .ph{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border)}
.panel .ph h3{font-size:0.98rem}
.panel .ph .sub{font-size:0.76rem;color:var(--text-muted);margin-top:2px}
.panel .pb{flex:1;overflow:auto;padding:14px}
.tk{display:flex;flex-direction:column;gap:8px;padding:11px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:9px;transition:border-color .15s,background .15s}
.tk:hover{border-color:var(--primary);background:rgba(123,140,255,.05)}
.tk .tkmain{display:flex;align-items:center;gap:10px}
.unitbar{display:flex;align-items:center;gap:6px;font-size:0.74rem;color:var(--text-muted);margin-bottom:12px}
.unitbar button{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:3px 10px;cursor:pointer;font-size:0.74rem;transition:.12s}
.unitbar button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.unitbar button:not(.on):hover{border-color:var(--primary);color:var(--text)}
.tk .tkdates{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.tk .tkdates .dl{font-size:0.7rem;color:var(--text-muted);font-weight:600;white-space:nowrap}
.tk .tkdates input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:3px 7px;font-size:0.73rem;color-scheme:dark;transition:.12s}
.tk .tkdates input:focus{outline:none;border-color:var(--primary)}
.tk .tkdates span{color:var(--text-muted);font-size:0.74rem}
.tk .pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tk .tinfo{flex:1;min-width:0}
.tk .tt{font-weight:650;font-size:0.84rem;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tk .tm{font-size:0.71rem;color:var(--text-muted);margin-top:1px}
.tk .th{font-weight:700;font-size:0.84rem;color:var(--text)}
.tk .tkedit{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tk .tkedit input{width:52px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:4px 7px;font-size:0.82rem;text-align:right;font-variant-numeric:tabular-nums;transition:.12s}
.tk .tkedit input:focus{outline:none;border-color:var(--primary)}
.tk .tkedit .u{font-size:0.7rem;color:var(--text-muted);min-width:8px}
.tk .tkedit select{width:34px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:4px 2px;font-size:0.82rem;cursor:pointer;transition:.12s}
.tk .tkedit select:hover{border-color:var(--primary);color:var(--text)}
.panel .pf{padding:12px 14px;border-top:1px solid var(--border)}
.x{background:transparent;border:0;color:var(--text-muted);font-size:1.3rem;cursor:pointer;line-height:1}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);background:var(--surface-3);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:0.8rem;opacity:0;pointer-events:none;transition:.2s;z-index:30;max-width:80vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#cfOverlay{z-index:30}
.cfmodal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;z-index:31;width:380px;max-width:90vw;opacity:0;pointer-events:none;transition:.18s}
.cfmodal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.cfmodal h3{font-size:1rem;margin-bottom:8px}
.cfmodal p{font-size:0.84rem;color:var(--text-muted);margin-bottom:16px;line-height:1.45;white-space:pre-line}
.cfmodal .cfbtns{display:flex;justify-content:flex-end;gap:8px}
.colres.clk{cursor:pointer}
.colres.clk:hover{background:var(--surface-3)}
.cell.redu{background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(71,85,105,.28) 5px,rgba(71,85,105,.28) 10px)}
.rl{font-size:0.78rem;color:var(--text-muted);font-weight:600}
.capedit{display:flex;align-items:center;gap:8px;margin-top:6px}
.capedit input{width:74px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:0.85rem}
.capedit .u{color:var(--text-muted);font-size:0.8rem}
.indispo{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;margin-top:6px}
.indispo .il{font-weight:600;font-size:0.8rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.indispo .id{font-size:0.72rem;color:var(--text-muted);white-space:nowrap}
.indispo .ix{background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:1.1rem;line-height:1}
.indispo-add{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.indispo-add>input[type=text]{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:0.8rem}
.indispo-add .dd{display:flex;align-items:center;gap:6px}
.indispo-add .dd input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 6px;font-size:0.74rem;color-scheme:dark}
.indispo-add .dd span{color:var(--text-muted)}
</style>
</head>
<body>
<div id="app">
  <div class="bar">
    <div class="title"><span class="ic">▦</span> Plan</div>
    <div class="seg" id="segGran"></div>
    <div class="nav">
      <button class="btn ghost" id="navPrev">◀</button>
      <span class="range" id="navRange">—</span>
      <button class="btn ghost" id="navNext">▶</button>
      <button class="btn ghost" id="navToday" style="display:none">Aujourd'hui</button>
    </div>
    <div class="spacer"></div>
    <label class="chk"><span>Grouper</span>
      <select class="btn" id="selGroup">
        <option value="person">Personne</option>
        <option value="project">Projet</option>
        <option value="role">Rôle</option>
      </select>
    </label>
    <div class="seg" id="segMode"></div>
    <div class="seg" id="segUnit"></div>
    <label class="chk"><input type="checkbox" id="chkDone"> Inclure terminé</label>
    <label class="chk" title="Estimer la charge des tâches sans charge à partir de leur estimation ÷ nb assignés"><input type="checkbox" id="chkDerive"> Estimer</label>
    <label class="chk" title="Étaler la charge sur les jours ouvrés (lun-ven) seulement"><input type="checkbox" id="chkWorkdays"> Jours ouvrés</label>
    <button class="btn" id="btnInit" title="Initialiser la charge des tâches sans charge depuis estimationH ÷ nb assignés">⚙ Init. charges</button>
    <button class="btn" id="btnExport" title="Exporter le plan en CSV (COPIL)">⬇ CSV</button>
    <button class="btn" id="btnTimeline" title="Timeline par personne : les tâches de chacun en barres sur la fenêtre">⊞ Timeline</button>
  </div>
  <div class="alerts" id="alerts"></div>
  <div class="gridwrap" id="gridwrap"><div class="empty"><div class="ic">▦</div><div>Chargement…</div></div></div>
  <div class="legend" id="legend">
    <span><span class="sw" style="background:var(--ok)"></span>charge OK</span>
    <span><span class="sw" style="background:var(--warn)"></span>&gt; 85% capacité</span>
    <span><span class="sw" style="background:var(--over)"></span>surcharge</span>
    <span><span class="sw" style="background:var(--off)"></span>capacité réduite</span>
    <span>· = aucune charge</span>
  </div>
  <div class="legend" id="legendDispo" style="display:none">
    <span><span class="sw" style="background:rgba(21,160,107,.85)"></span>capacité disponible (plus vert = plus de marge)</span>
    <span>· = complet / en surcharge</span>
  </div>
  <div class="legend" id="legendRealise" style="display:none">
    <span>réalisé = temps passé saisi · <b>estimé</b> (= prévu) pour les tâches clôturées sans temps</span>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="ph">
    <div><h3 id="pTitle">Détail</h3><div class="sub" id="pSub"></div></div>
    <button class="x" id="pClose">×</button>
  </div>
  <div class="pb" id="pBody"></div>
</div>
<div id="toast" class="toast"></div>
<style>
.tlpanel { position: fixed; left: 0; right: 0; bottom: 0; height: 46vh; background: var(--card-bg, #1a2236); border-top: 1px solid var(--border, #2a3550); box-shadow: 0 -12px 40px rgba(0,0,0,.4); transform: translateY(100%); transition: transform .25s ease, right .2s ease; z-index: 45; display: flex; flex-direction: column; }
body.panel-open .tlpanel { right: min(380px, 92vw); }
#app { transition: margin-right .2s ease; }
body.panel-open #app { margin-right: min(380px, 92vw); }
.tlpanel.open { transform: translateY(0); }
.tlhead { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border, #2a3550); flex: none; font-size: .9rem; }
.tlhead .tlrange { color: var(--text-muted, #94a3b8); font-size: .76rem; margin-left: 8px; font-weight: 400; }
.tlhead .x { background: none; border: none; color: var(--text-muted, #94a3b8); font-size: 1.4rem; cursor: pointer; line-height: 1; }
.tlbody { overflow: auto; flex: 1; padding-bottom: 14px; }
.tl-axis { display: flex; position: sticky; top: 0; background: var(--card-bg, #1a2236); z-index: 2; padding: 5px var(--sum-col) 5px 0; border-bottom: 1px solid var(--border, #2a3550); }
.tl-axis .c { flex: 1; text-align: center; font-size: .6rem; color: var(--text-muted, #94a3b8); border-left: 1px solid var(--border, #2a3550); }
.tl-grp { font-size: .74rem; font-weight: 700; color: var(--text, #e2e8f0); padding: 9px 14px 3px; display: flex; align-items: center; gap: 7px; }
.tl-grp .tava { width: 18px; height: 18px; border-radius: 50%; color: #fff; font-size: .56rem; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; flex: none; }
.tl-row { display: flex; align-items: center; height: 23px; }
.tl-lbl { width: var(--res-col); flex: none; font-size: .71rem; color: var(--text-muted, #cbd5e1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px 0 28px; box-sizing: border-box; }
.tl-track { flex: 1; position: relative; height: 100%; border-left: 1px solid var(--border, #2a3550); margin-right: var(--sum-col); }
.tl-bar { position: absolute; top: 4px; height: 15px; min-width: 4px; border-radius: 4px; font-size: .59rem; color: #fff; line-height: 15px; padding: 0 5px; overflow: hidden; white-space: nowrap; box-shadow: 0 1px 3px rgba(0,0,0,.35); cursor: pointer; }
.tl-bar:hover { filter: brightness(1.12); }
.tl-empty { padding: 26px; text-align: center; color: var(--text-muted, #94a3b8); font-size: .82rem; }
.tl-band { position: absolute; top: 0; bottom: 0; background: rgba(123,140,255,.13); border-left: 1px solid rgba(123,140,255,.55); border-right: 1px solid rgba(123,140,255,.55); pointer-events: none; z-index: 0; }
.tl-grp.tl-focus, .tl-row.tl-focus { background: rgba(123,140,255,.08); }
.tl-axis .c.on { color: var(--primary, #7b8cff); font-weight: 700; }
.tl-bar { z-index: 1; }
.tl-bar.hot { z-index: 3; outline: 2px solid #fff; box-shadow: 0 0 0 2px rgba(123,140,255,.7), 0 2px 7px rgba(0,0,0,.45); }
.tl-bar { cursor: grab; }
.tl-bar.dragging { pointer-events: none; opacity: .9; z-index: 6; box-shadow: 0 6px 20px rgba(0,0,0,.55); }
.tl-row.drop-tgt, .tl-grp.drop-tgt { background: rgba(123,140,255,.16); box-shadow: inset 0 0 0 1px rgba(123,140,255,.65); }
.grid td.cell.sel { outline: 2px solid var(--primary, #7b8cff); outline-offset: -2px; border-radius: 3px; }
.grid tr.grp td { background: rgba(123,140,255,.07); }
.grid .colres.ghead { font-weight: 700; }
.grid .colres.ghead .gdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 9px; flex: none; }
.grid tr.grp .gval { font-weight: 700; color: var(--text-muted, #cbd5e1); font-variant-numeric: tabular-nums; }
.grid .colres.sub { padding-left: 30px; }
.grid .colres.sub .ava { width: 20px; height: 20px; font-size: .56rem; }
.tl-sec { font-size: .78rem; font-weight: 800; color: var(--text, #e6e9f2); padding: 11px 14px 3px; display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border, #2a3550); margin-top: 3px; }
.tl-sec .gdot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
.tl-grp.tl-ind { padding-left: 26px; }
.tl-row.tl-ind .tl-lbl { padding-left: 42px; }
.pbanner { padding: 9px 12px; border-radius: 9px; font-size: .8rem; font-weight: 600; margin-bottom: 10px; border-left: 3px solid transparent; line-height: 1.4; }
.pbanner b { font-weight: 800; }
.pbanner.over { background: rgba(229,72,77,.13); color: #ff9094; border-left-color: #e5484d; }
.pbanner.warn { background: rgba(245,158,11,.13); color: #f3b35e; border-left-color: #f59e0b; }
.pbanner.ok { background: rgba(59,130,246,.12); color: #93b6ff; border-left-color: #3b82f6; }
.pbanner.under { background: rgba(21,160,107,.12); color: #54d2a4; border-left-color: #15a06b; }
.phint { font-size: .75rem; color: var(--text-muted, #94a3b8); margin-bottom: 12px; line-height: 1.55; }
.phint b { color: var(--text, #cbd5e1); font-weight: 600; }
.tlpop { position: fixed; z-index: 60; width: 272px; max-width: 88vw; background: var(--surface, #1a2236); border: 1px solid var(--border, #2a3550); border-radius: 12px; box-shadow: 0 14px 44px rgba(0,0,0,.5); padding: 13px; }
.tpc-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
.tpc-prio, .tpc-status, .tpc-mil { font-size: .64rem; font-weight: 700; padding: 2px 8px; border-radius: 6px; line-height: 1.45; }
.tpc-mil { background: rgba(124,92,240,.18); color: #b9a6ff; }
.tpc-title { font-weight: 700; font-size: .92rem; letter-spacing: -.01em; margin-bottom: 7px; line-height: 1.25; }
.tpc-meta { display: flex; flex-direction: column; gap: 4px; font-size: .74rem; color: var(--text-muted, #94a3b8); margin-bottom: 9px; }
.tpc-proj { display: inline-flex; align-items: center; gap: 6px; }
.tpc-proj i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex: none; }
.tpc-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.tpc-ava { display: flex; }
.tpc-av { width: 23px; height: 23px; border-radius: 50%; color: #fff; font-size: .56rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 0 0 2px var(--surface, #1a2236); margin-left: -5px; }
.tpc-av:first-child { margin-left: 0; }
.tpc-prog { display: flex; align-items: center; gap: 7px; flex: 1; }
.tpc-track { flex: 1; height: 5px; background: var(--surface-2, #232c44); border-radius: 3px; overflow: hidden; }
.tpc-track div { height: 100%; background: var(--primary, #7b8cff); border-radius: 3px; }
.tpc-prog span { font-size: .68rem; font-weight: 700; color: var(--text-muted, #cbd5e1); font-variant-numeric: tabular-nums; }
.tpc-hours { font-size: .72rem; color: var(--text-muted, #94a3b8); margin-bottom: 9px; }
.tpc-cloture { font-size: .72rem; font-weight: 600; margin-bottom: 9px; }
.tpc-foot { display: flex; gap: 7px; }
.tpc-foot button { flex: 1; border: 1px solid var(--border, #2a3550); background: transparent; color: var(--text, #cbd5e1); border-radius: 8px; padding: 6px; font-size: .75rem; cursor: pointer; transition: .12s; }
.tpc-foot button:hover { filter: brightness(1.12); }

<script>
"use strict";

// <taskflow-core> -- GENERE par scripts/build-taskflow.js, NE PAS EDITER ICI
/* ============================================================================
 * taskflow-core.js — Module commun aux widgets TaskFlow
 * ----------------------------------------------------------------------------
 * SOURCE UNIQUE. Inline dans chaque widget par scripts/build-taskflow.js entre
 * les marqueurs de generation prevus a cet effet.
 * NE PAS editer la copie inlinee dans les .html : editer CE fichier puis lancer
 *   npm run build:taskflow
 *
 * Expose un objet `TF` (namespace) pour ne jamais entrer en collision avec les
 * helpers locaux existants des widgets. Toutes les fonctions qui ecrivent dans
 * Grist sont DEFENSIVES : en cas d'echec elles n'interrompent jamais le widget
 * (au pire, comportement actuel inchange).
 * ========================================================================== */
const TF = (function () {
    'use strict';

    /* ----- Statuts ---------------------------------------------------------
     * Convention : l'ORDRE fait foi. Le DERNIER statut de la liste est l'etat
     * terminal ("termine") utilise par la logique de completion des widgets.
     * Les statuts reels proviennent de la colonne Choice `statut` (editable par
     * l'utilisateur dans Grist). DEFAULT_STATUSES n'est qu'un repli.
     * --------------------------------------------------------------------- */
    const DEFAULT_STATUSES = [
        { value: 'todo',       label: 'À faire',  fillColor: '#94a3b8', textColor: '#ffffff' },
        { value: 'inprogress', label: 'En cours', fillColor: '#f59e0b', textColor: '#ffffff' },
        { value: 'review',     label: 'En revue', fillColor: '#3b82f6', textColor: '#ffffff' },
        { value: 'done',       label: 'Terminé',  fillColor: '#10b981', textColor: '#ffffff' }
    ];
    // Repli libelle + couleur pour les CODES par defaut. Permet d'afficher un libelle
    // FR (et la bonne couleur) meme quand la colonne Choice stocke le code brut
    // (todo/inprogress/...). Une valeur renommee par l'utilisateur garde SON libelle.
    const DEFAULTS_BY_VALUE = {};
    for (var _i = 0; _i < DEFAULT_STATUSES.length; _i++) DEFAULTS_BY_VALUE[DEFAULT_STATUSES[_i].value] = DEFAULT_STATUSES[_i];

    // Convertit un tableau Grist colonnaire en tableau d'objets lignes.
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        const cols = Object.keys(data);
        if (!cols.length) return [];
        const n = (data[cols[0]] && data[cols[0]].length) || 0;
        const rows = [];
        for (let i = 0; i < n; i++) {
            const rec = {};
            for (const k of cols) rec[k] = data[k][i];
            rows.push(rec);
        }
        return rows;
    }

    // Resout le rowId d'une table depuis son tableId via _grist_Tables.
    async function tableRowId(grist, tableId) {
        const meta = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
        const row = meta.find(r => r.tableId === tableId);
        return row ? row.id : null;
    }

    // Construit une config de statuts normalisee depuis une liste brute.
    function buildStatusConfig(list, source) {
        const clean = (list || []).filter(s => s && s.value != null).map(s => {
            const v = String(s.value);
            const d = DEFAULTS_BY_VALUE[v];
            const hasExplicitLabel = s.label != null && s.label !== '' && String(s.label) !== v;
            return {
                value: v,
                label: hasExplicitLabel ? String(s.label) : (d ? d.label : v),
                fillColor: s.fillColor || (d ? d.fillColor : '#94a3b8'),
                textColor: s.textColor || (d ? d.textColor : '#ffffff')
            };
        });
        const final = clean.length ? clean : DEFAULT_STATUSES.slice();
        const byValue = {};
        for (const s of final) byValue[s.value] = s;
        return {
            list: final,
            byValue,
            values: final.map(s => s.value),
            terminalValue: final[final.length - 1].value, // convention "dernier = termine"
            firstValue: final[0].value,
            source: clean.length ? source : 'default'
        };
    }

    /* Lit les statuts (libelles + couleurs + ordre) depuis la colonne Choice
     * indiquee, via les metadonnees Grist. Repli en cascade :
     *   1. options de la colonne Choice (cas ideal)
     *   2. valeurs distinctes presentes dans les donnees (colonne Text)
     *   3. DEFAULT_STATUSES
     * Ne jette jamais : retourne toujours une config exploitable.
     */
    async function loadStatusConfig(grist, table, column, distinctFallback) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid != null) {
                const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
                const col = cols.find(c => c.parentId === tid && c.colId === column);
                if (col && col.widgetOptions) {
                    let opt = {};
                    try { opt = JSON.parse(col.widgetOptions) || {}; } catch (e) { opt = {}; }
                    const choices = Array.isArray(opt.choices) ? opt.choices : [];
                    const co = opt.choiceOptions || {};
                    if (choices.length) {
                        return buildStatusConfig(choices.map(ch => ({
                            value: ch,
                            label: ch,
                            fillColor: co[ch] && co[ch].fillColor,
                            textColor: co[ch] && co[ch].textColor
                        })), 'choice');
                    }
                }
            }
        } catch (e) { /* repli silencieux */ }

        if (Array.isArray(distinctFallback) && distinctFallback.length) {
            const seen = [];
            for (const v of distinctFallback) { if (v != null && v !== '' && seen.indexOf(v) === -1) seen.push(v); }
            if (seen.length) return buildStatusConfig(seen.map(v => ({ value: v, label: v })), 'data');
        }
        return buildStatusConfig(DEFAULT_STATUSES.slice(), 'default');
    }

    function getStatus(cfg, value) {
        if (cfg && cfg.byValue && cfg.byValue[value]) return cfg.byValue[value];
        return { value: value, label: value || '', fillColor: '#94a3b8', textColor: '#ffffff' };
    }
    function isTerminal(cfg, value) { return !!cfg && value === cfg.terminalValue; }

    /* Seme les options (choix + couleurs) sur une colonne Choice si elle n'en a
     * pas encore. Defensif. A appeler depuis ensureSchema apres creation.
     */
    async function seedStatusChoices(grist, table, column, statuses) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid == null) return;
            const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            const col = cols.find(c => c.parentId === tid && c.colId === column);
            if (!col) return;
            let opt = {};
            try { opt = JSON.parse(col.widgetOptions || '{}') || {}; } catch (e) { opt = {}; }
            if (Array.isArray(opt.choices) && opt.choices.length) return; // deja configure : on respecte
            const list = statuses && statuses.length ? statuses : DEFAULT_STATUSES;
            const choiceOptions = {};
            for (const s of list) choiceOptions[s.value] = { fillColor: s.fillColor, textColor: s.textColor };
            const widgetOptions = JSON.stringify({ choices: list.map(s => s.value), choiceOptions: choiceOptions });
            await grist.docApi.applyUserActions([['ModifyColumn', table, column, { widgetOptions: widgetOptions }]]);
        } catch (e) { console.warn('TF.seedStatusChoices:', e && e.message); }
    }

    /* ----- #2 : colonnes d'affichage des Ref (noms au lieu des IDs) ---------
     * Pose le visibleCol + la display formula sur des colonnes Ref pour que les
     * VUES NATIVES Grist affichent un libelle plutot que l'ID de ligne.
     * specs : [{ table:'Tasks', column:'projet', visibleColId:'nom' }, ...]
     * DEFENSIF : si Grist refuse une action, on log et on continue ; au pire
     * l'affichage reste en IDs (comportement actuel), jamais de casse.
     * --------------------------------------------------------------------- */
    async function setRefDisplayColumns(grist, specs) {
        if (!Array.isArray(specs) || !specs.length) return;
        try {
            const tables = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
            const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            const tidOf = (tableId) => { const r = tables.find(t => t.tableId === tableId); return r ? r.id : null; };
            const colOf = (tableRow, colId) => cols.find(c => c.parentId === tableRow && c.colId === colId);

            const actions = [];
            for (const s of specs) {
                const srcTid = tidOf(s.table);
                if (srcTid == null) continue;
                const refCol = colOf(srcTid, s.column);
                if (!refCol) continue;
                // Table cible deduite du type "Ref:Target" / "RefList:Target".
                const m = /^(?:Ref|RefList):(.+)$/.exec(refCol.type || '');
                if (!m) continue;
                const targetTid = tidOf(m[1]);
                if (targetTid == null) continue;
                const visCol = colOf(targetTid, s.visibleColId);
                if (!visCol) continue;
                // Eviter de re-poser si deja correct.
                if (refCol.visibleCol === visCol.id) continue;
                actions.push(['SetDisplayFormula', s.table, null, refCol.id, '$' + s.column + '.' + s.visibleColId]);
                actions.push(['UpdateRecord', '_grist_Tables_column', refCol.id, { visibleCol: visCol.id }]);
            }
            if (actions.length) await grist.docApi.applyUserActions(actions);
        } catch (e) { console.warn('TF.setRefDisplayColumns:', e && e.message); }
    }

    /* ----- #3 : plan de charge (heures par personne) ------------------------
     * Stockage : colonne Text `charges` sur Tasks, JSON [{teamId, heures}].
     * Parse defensif identique au pattern subtasks.
     * --------------------------------------------------------------------- */
    function parseCharges(v) {
        try {
            const a = JSON.parse(v || '[]');
            if (!Array.isArray(a)) return [];
            return a.filter(x => x && x.teamId != null)
                    .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
                    .filter(x => !isNaN(x.teamId));
        } catch (e) { return []; }
    }
    function chargesToJson(arr) {
        return JSON.stringify((arr || [])
            .filter(x => x && x.teamId != null)
            .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
            .filter(x => !isNaN(x.teamId)));
    }
    // Heures totales d'une tache (somme des charges par personne).
    function chargeTotal(charges) { return parseCharges(typeof charges === 'string' ? charges : JSON.stringify(charges || [])).reduce((s, c) => s + c.heures, 0); }
    // Agrege la charge par membre sur une liste de taches (chaque tache expose .charges).
    function chargeByMember(tasks) {
        const by = {};
        for (const t of (tasks || [])) {
            for (const c of parseCharges(t && t.charges)) {
                by[c.teamId] = (by[c.teamId] || 0) + c.heures;
            }
        }
        return by;
    }

    // Cle de periode : semaine ISO 'YYYY-Www' ou mois 'YYYY-MM'.
    function periodKey(date, granularity) {
        if (granularity === 'month') {
            return date.getUTCFullYear() + '-' + String(date.getUTCMonth() + 1).padStart(2, '0');
        }
        const d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
        const day = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return d.getUTCFullYear() + '-W' + String(week).padStart(2, '0');
    }

    // #3 plan de charge temporel : etale les charges PROPRES de chaque tache sur sa
    // duree (jours calendaires), agrege par personne et par periode.
    // dateDebut/dateEcheance = timestamps Unix SECONDES (Grist). Tache sans dates ou
    // sans charge = ignoree. Retourne { teamId: { periodKey: heures } }.
    function chargeByMemberPeriod(tasks, granularity) {
        const g = granularity === 'month' ? 'month' : 'week';
        const out = {};
        for (const t of (tasks || [])) {
            const charges = parseCharges(t && t.charges);
            if (!charges.length) continue;
            const s = t.dateDebut, e = t.dateEcheance;
            if (s == null || e == null) continue;
            const day0 = Math.floor((s * 1000) / 86400000);
            const day1 = Math.floor((e * 1000) / 86400000);
            const nDays = Math.max(day1 - day0 + 1, 1);
            for (const c of charges) {
                const perDay = (Number(c.heures) || 0) / nDays;
                if (!perDay) continue;
                if (!out[c.teamId]) out[c.teamId] = {};
                for (let dd = day0; dd <= day1; dd++) {
                    const key = periodKey(new Date(dd * 86400000), g);
                    out[c.teamId][key] = (out[c.teamId][key] || 0) + perDay;
                }
            }
        }
        return out;
    }

    // Decale une date de n periodes (semaine = 7 jours, mois = 1 mois).
    function shiftPeriods(date, granularity, n) {
        const d = new Date(date.getTime());
        if (granularity === 'month') d.setUTCMonth(d.getUTCMonth() + n);
        else d.setUTCDate(d.getUTCDate() + n * 7);
        return d;
    }

    // Liste contigue de cles de periode (semaine ISO ou mois) a partir d'une date,
    // alignee sur le debut de periode (lundi / 1er du mois). Inclut les periodes vides.
    function periodRange(startDate, granularity, count) {
        const g = granularity === 'month' ? 'month' : 'week';
        let d = new Date(Date.UTC(startDate.getUTCFullYear(), startDate.getUTCMonth(), startDate.getUTCDate()));
        if (g === 'week') { const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() - day + 1); }
        else { d = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1)); }
        const out = [];
        for (let i = 0; i < count; i++) {
            out.push(periodKey(d, g));
            if (g === 'week') d.setUTCDate(d.getUTCDate() + 7);
            else d.setUTCMonth(d.getUTCMonth() + 1);
        }
        return out;
    }

    // chargeMatrix : generalise chargeByMemberPeriod. Etale les charges (via getCharges,
    // defaut parseCharges) sur la duree, agrege par cle keyFn(t, charge) et periode.
    function chargeMatrix(tasks, keyFn, granularity, getCharges, workdays) {
        const g = granularity === 'month' ? 'month' : 'week';
        const out = {};
        for (const t of (tasks || [])) {
            const charges = getCharges ? getCharges(t) : parseCharges(t && t.charges);
            if (!charges.length || t.dateDebut == null || t.dateEcheance == null) continue;
            const d0 = Math.floor((t.dateDebut * 1000) / 86400000), d1 = Math.floor((t.dateEcheance * 1000) / 86400000);
            const days = [];
            for (let dd = d0; dd <= d1; dd++) { if (workdays) { const wd = new Date(dd * 86400000).getUTCDay(); if (wd < 1 || wd > 5) continue; } days.push(dd); }
            if (!days.length) days.push(d0);
            for (const c of charges) {
                const key = keyFn(t, c); if (key == null) continue;
                const perDay = c.heures / days.length; if (!perDay) continue;
                if (!out[key]) out[key] = {};
                for (const dd of days) { const pk = periodKey(new Date(dd * 86400000), g); out[key][pk] = (out[key][pk] || 0) + perDay; }
            }
        }
        return out;
    }

    return {
        DEFAULT_STATUSES: DEFAULT_STATUSES,
        columnarToRows: columnarToRows,
        loadStatusConfig: loadStatusConfig,
        buildStatusConfig: buildStatusConfig,
        getStatus: getStatus,
        isTerminal: isTerminal,
        seedStatusChoices: seedStatusChoices,
        setRefDisplayColumns: setRefDisplayColumns,
        parseCharges: parseCharges,
        chargesToJson: chargesToJson,
        chargeTotal: chargeTotal,
        chargeByMember: chargeByMember,
        periodKey: periodKey,
        chargeByMemberPeriod: chargeByMemberPeriod,
        shiftPeriods: shiftPeriods,
        periodRange: periodRange,
        chargeMatrix: chargeMatrix
    };
})();
// </taskflow-core>

// ============================================================================
// État
// ============================================================================
const S = {
  tasks: [], team: [], projects: [],
  granularity: 'week', offset: 0, horizon: 12,
  groupBy: 'person', unit: 'pct', includeDone: false, derive: false, mode: 'prevu', workdays: false, allocUnit: 'h',
  demo: false, extFilters: null, timeline: false
};
let statusCfg = TF.buildStatusConfig(TF.DEFAULT_STATUSES, 'default'); // #1 : statuts dynamiques — alimenté par TF.loadStatusConfig en Grist (terminal/libellés depuis les vrais choix)

// Utils
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const getRefList = (v) => Array.isArray(v) && v[0] === 'L' ? v.slice(1).map(Number) : [];
const teamById = (id) => S.team.find(m => m.id === id);
const projById = (id) => S.projects.find(p => p.id === id);
const activeTeam = () => S.team.filter(m => m.actif !== false);
const isTerminal = (t) => TF.isTerminal(statusCfg, t.statut);
const capOf = (m) => (Number(m && m.capaciteHebdo) > 0 ? Number(m.capaciteHebdo) : 35);
const capPeriod = (cap) => S.granularity === 'month' ? cap * 52 / 12 : cap;
const plabel = (p) => S.granularity === 'month' ? (p.slice(5) + '/' + p.slice(2, 4)) : ('S' + p.slice(6));
const MOIS = ['janv', 'févr', 'mars', 'avr', 'mai', 'juin', 'juil', 'août', 'sept', 'oct', 'nov', 'déc'];
function periodStarts(start, g, count) {
  let d = new Date(Date.UTC(start.getUTCFullYear(), start.getUTCMonth(), start.getUTCDate()));
  if (g === 'week') { const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() - day + 1); } else { d = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1)); }
  const out = []; for (let i = 0; i < count; i++) { out.push(new Date(d)); if (g === 'week') d.setUTCDate(d.getUTCDate() + 7); else d.setUTCMonth(d.getUTCMonth() + 1); } return out;
}
function subLabel(d) { return S.granularity === 'month' ? '' : (d.getUTCDate() + ' ' + MOIS[d.getUTCMonth()]); }
const r1 = (n) => Math.round(n * 10) / 10;

function planTasks() {
  let ts = S.includeDone ? S.tasks : S.tasks.filter(t => !isTerminal(t));
  const f = S.extFilters;  // filtres partagés diffusés par la suite (onOptions)
  if (f) {
    if (f.project != null && f.project !== '') ts = ts.filter(t => String(t.projet) === String(f.project));
    if (Array.isArray(f.assignee) && f.assignee.length) ts = ts.filter(t => getRefList(t.assignees).some(a => f.assignee.map(Number).includes(a)));
    if (Array.isArray(f.statut) && f.statut.length) ts = ts.filter(t => f.statut.includes(t.statut));
  }
  return ts;
}
// Charges effectives : réelles, ou dérivées de estimationH ÷ nb assignés si l'option est active.
function effCharges(t) {
  const c = TF.parseCharges(t.charges);
  if (c.length || !S.derive) return c;
  const est = Number(t.estimationH) || 0, asg = getRefList(t.assignees);
  return (est > 0 && asg.length) ? asg.map(id => ({ teamId: id, heures: est / asg.length })) : [];
}
// Réalisé : répartit tempsPasse de la tâche au prorata des charges propres par personne.
function realCharges(t) {
  const cs = effCharges(t); const tot = cs.reduce((s, c) => s + c.heures, 0); const tp = Number(t.tempsPasse) || 0;
  if (!tot || !tp) return []; return cs.map(c => ({ teamId: c.teamId, heures: c.heures * tp / tot }));
}
// Réalisé : tempsPasse réparti (mesure) ; à défaut, pour une tâche CLÔTURÉE, réalisé estimé = prévu (étalé sur la période réelle via dateCloture, cf render).
function realisedCharges(t) { const rc = realCharges(t); if (rc.length) return rc; return isTerminal(t) ? effCharges(t) : []; }
function chargesFor(t) {
  if (S.mode === 'realise') return realisedCharges(t);
  if (S.mode === 'reste') { const rm = {}; for (const c of realisedCharges(t)) rm[c.teamId] = c.heures; return effCharges(t).map(c => ({ teamId: c.teamId, heures: Math.max(c.heures - (rm[c.teamId] || 0), 0) })).filter(c => c.heures > 0); }
  return effCharges(t);
}
const taskWeeks = (t) => Math.max((Math.floor(t.dateEcheance * 1000 / 86400000) - Math.floor(t.dateDebut * 1000 / 86400000) + 1) / 7, 1 / 7);
const gToInput = (ts) => ts ? new Date(ts * 1000).toISOString().slice(0, 10) : '';
const inputToG = (s) => s ? Math.floor(Date.parse(s + 'T00:00:00Z') / 1000) : null;
function tasksForKey(key) {
  if (S.groupBy === 'project') return planTasks().filter(t => String(t.projet || '0') === String(key)).map(t => t.id);
  if (S.groupBy === 'person') return planTasks().filter(t => getRefList(t.assignees).includes(Number(key))).map(t => t.id);
  return [];
}
function toast(msg) { const el = document.getElementById('toast'); if (!el) return; el.textContent = msg; el.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => el.classList.remove('show'), 2800); }

function keyFn() {
  // Projet/Rôle = clé COMPOSITE "groupe|personne" → on garde la personne (vue ressource, distincte du Gantt).
  if (S.groupBy === 'project') return (t, c) => (t.projet ? String(t.projet) : '0') + '|' + c.teamId;
  if (S.groupBy === 'role') return (t, c) => { const m = teamById(c.teamId); return ((m && m.role) ? m.role : '—') + '|' + c.teamId; };
  return (t, c) => String(c.teamId);
}

// Lignes (ressources/groupes) avec libellé + capacité nominale + membres (pour la capacité par période)
function buildRows() {
  // Projet/Rôle : HIÉRARCHIQUE → ligne d'en-tête (groupe) + une sous-ligne par personne du groupe (capacité-aware).
  if (S.groupBy === 'project') {
    const ps = {};
    for (const t of planTasks()) {
      const pk = t.projet ? String(t.projet) : '0';
      if (!ps[pk]) { const p = projById(t.projet); ps[pk] = { label: p ? p.nom : 'Sans projet', color: p ? p.couleur : '#64748b', mem: new Map() }; }
      for (const c of effCharges(t)) { const m = teamById(c.teamId); if (m) ps[pk].mem.set(m.id, m); }
    }
    const out = [];
    for (const pk of Object.keys(ps)) {
      const g = ps[pk]; const mems = [...g.mem.values()];
      out.push({ key: 'h:' + pk, isHeader: true, label: g.label, color: g.color, members: mems, gkeys: mems.map(m => pk + '|' + m.id) });
      for (const m of mems) out.push({ key: pk + '|' + m.id, isSub: true, teamId: m.id, label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] });
    }
    return out;
  }
  if (S.groupBy === 'role') {
    const rs = {};
    for (const m of activeTeam()) { const r = m.role || '—'; if (!rs[r]) rs[r] = { label: r, color: '#6366f1', members: [] }; rs[r].members.push(m); }
    const out = [];
    for (const r of Object.keys(rs)) {
      const g = rs[r];
      out.push({ key: 'h:' + r, isHeader: true, label: r, color: g.color, members: g.members, gkeys: g.members.map(m => r + '|' + m.id) });
      for (const m of g.members) out.push({ key: r + '|' + m.id, isSub: true, teamId: m.id, label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] });
    }
    return out;
  }
  return activeTeam().map(m => ({ key: String(m.id), label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] }));
}

// Indisponibilités (Team.indispos JSON [{start,end,label}], dates ISO yyyy-mm-dd) -> capacité réduite par période.
function parseIndispos(v) { try { const a = JSON.parse(v || '[]'); return Array.isArray(a) ? a.filter(x => x && x.start && x.end) : []; } catch (e) { return []; } }
const dayIdx = (s) => Math.floor(Date.parse(s + 'T00:00:00Z') / 86400000);
function periodDays(periodStart) { return S.granularity === 'month' ? new Date(Date.UTC(periodStart.getUTCFullYear(), periodStart.getUTCMonth() + 1, 0)).getUTCDate() : 7; }
function indispoFrac(member, periodStart) {
  const ind = parseIndispos(member && member.indispos); if (!ind.length) return 0;
  const p0 = Math.floor(periodStart.getTime() / 86400000), days = periodDays(periodStart);
  let cnt = 0;
  for (let d = p0; d < p0 + days; d++) { for (const iv of ind) { if (d >= dayIdx(iv.start) && d <= dayIdx(iv.end)) { cnt++; break; } } }
  return Math.min(cnt / days, 1);
}
// Capacité d'une ligne sur une période donnée (heures), ajustée des indisponibilités.
function capForRow(row, periodStart) {
  return (row.members || []).reduce((s, m) => s + capPeriod(capOf(m)) * (1 - indispoFrac(m, periodStart)), 0);
}
function rowReduced(row, periodStart) { return (row.members || []).some(m => indispoFrac(m, periodStart) > 0); }

function cellColor(h, cap) {
  if (!(h > 0)) return 'transparent';
  if (!(cap > 0)) return 'var(--ok)';
  const r = h / cap; return r > 1 ? 'var(--over)' : r > 0.85 ? 'var(--warn)' : 'var(--ok)';
}

  if (!hasData && !undated) { wrap.innerHTML = '<div class="empty"><div class="ic">▦</div><div>Aucune charge datée à planifier</div><div style="font-size:.78rem">Renseignez la charge par personne + des dates sur les tâches.</div></div>'; renderAlerts(matrix, periods); return; }

  const starts = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  let h = '<table class="grid"><thead><tr><th class="colres">Ressource</th>';
  periods.forEach((p, i) => { h += '<th class="' + (p === nowKey ? 'now' : '') + '"><div class="pk">' + plabel(p) + (p === nowKey ? ' •' : '') + '</div><div class="psub">' + subLabel(starts[i]) + '</div></th>'; });
  h += '<th class="sum">Σ fenêtre</th></tr></thead><tbody>';
  const canEditRes = S.groupBy === 'person';
  for (const row of rows) {
    if (row.isHeader) {
      // En-tête de groupe (projet/rôle) : somme des sous-lignes, sans heat (repère de section).
      const hc = {}; for (const gk of row.gkeys) { const mc = matrix[gk] || {}; for (const p in mc) hc[p] = (hc[p] || 0) + mc[p]; }
      let wtot = 0;
      h += '<tr class="grp"><td class="colres ghead"><div class="res"><span class="gdot" style="background:' + row.color + '"></span><span class="nm">' + esc(row.label) + '</span></div></td>';
      for (let pi = 0; pi < periods.length; pi++) { const p = periods[pi], hr = r1(hc[p] || 0); wtot += hr; h += '<td class="' + (p === nowKey ? 'nowcol' : '') + '">' + (hr > 0 ? '<span class="gval">' + hr + '</span>' : '<span class="dot">·</span>') + '</td>'; }
      h += '<td class="sum"><div class="sh">' + r1(wtot) + ' h</div></td></tr>';
      continue;

    const cells = matrix[row.key] || {};
    const ini = row.label.split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();

    const resId = row.isSub ? row.teamId : row.key;
    h += '<tr' + (row.isSub ? ' class="subr"' : '') + '><td class="colres' + (row.isSub ? ' sub' : '') + (resClk ? ' clk' : '') + '"' + (resClk ? ' data-res="' + esc(resId) + '" title="Capacité & indisponibilités"' : '') + '><div class="res"><span class="ava" style="background:' + row.color + '">' + esc(ini) + '</span><span><span class="nm">' + esc(row.label) + '</span>' + (row.cap > 0 ? ' <span class="cap">(' + Math.round(capPeriod(row.cap)) + 'h)</span>' : '') + '</span></div></td>';
    let win = 0, peakR = 0;
    for (let pi = 0; pi < periods.length; pi++) {
      const p = periods[pi], hr = r1(cells[p] || 0);
      const capP = capForRow(row, starts[pi]);
      const redu = rowReduced(row, starts[pi]);
      let content;
      if (dispo) { const free = capP > 0 ? r1(Math.max(capP - hr, 0)) : 0; win += free; content = fmtDispo(free, capP); }
      else { win += hr; if (capP > 0 && hr / capP > peakR) peakR = hr / capP; content = fmtCell(hr, capP); }
      h += '<td class="cell' + (p === nowKey ? ' nowcol' : '') + (redu ? ' redu' : '') + (String(S._cellKey) === String(row.key) && p === S._cellPeriod ? ' sel' : '') + '" data-key="' + esc(row.key) + '" data-period="' + p + '">' + content + '</td>';
    }
    const peak = Math.round(peakR * 100);
    h += '<td class="sum"><div class="sh">' + r1(win) + ' h</div>' + (dispo ? '<div class="sp">dispo</div>' : '<div class="sp" style="' + (peak > 100 ? 'color:var(--over)' : '') + '">pic ' + peak + '%</div>') + '</td>';
    h += '</tr>';
  }
  h += '</tbody>';
  // pied : total équipe par période vs capacité (ajustée des indisponibilités)
  h += '<tfoot><tr><td class="colres" style="text-align:left;padding:7px 10px">' + (dispo ? 'Dispo équipe' : 'Capacité équipe') + '</td>';
  let grand = 0;
  for (let pi = 0; pi < periods.length; pi++) {
    const p = periods[pi];
    // charge totale = somme des sous-lignes (les en-têtes n'ont pas de clé matrice) ; capacité = équipe une seule fois (indép. du groupement)
    let tot = 0; for (const row of rows) if (!row.isHeader) tot += (matrix[row.key] || {})[p] || 0;
    const capTeam = activeTeam().reduce((s, m) => s + capPeriod(capOf(m)) * (1 - indispoFrac(m, starts[pi])), 0);
    if (dispo) {
      const freeTot = Math.max(capTeam - tot, 0); grand += freeTot;
      h += '<td class="' + (p === nowKey ? 'nowcol' : '') + '">' + (freeTot > 0.05 ? r1(freeTot) : '·') + '</td>';
    } else {
      grand += tot;
      const pc = capTeam > 0 ? Math.round(tot / capTeam * 100) : null;
      h += '<td class="' + (p === nowKey ? 'nowcol' : '') + '">' + (tot > 0 ? r1(tot) + (pc != null ? '<div style="font-size:.66rem;color:var(--text-muted);font-weight:400">' + pc + '%</div>' : '') : '·') + '</td>';
    }
  }
  h += '<td class="sum"><div class="sh">' + r1(grand) + ' h</div></td></tr></tfoot></table>';
  wrap.innerHTML = h;
  wrap.querySelectorAll('td.cell').forEach(td => td.addEventListener('click', () => openCell(td.dataset.key, td.dataset.period)));
  wrap.querySelectorAll('td.colres.clk').forEach(td => td.addEventListener('click', () => openResource(td.dataset.res)));
  renderAlerts(matrix, periods);
  if (S.timeline) renderTimeline();
}

// Timeline par personne : tâches de chacun en barres sur la même fenêtre que la heatmap (panel du bas).
function toggleTimeline() {
  S.timeline = !S.timeline;
  const b = document.getElementById('btnTimeline'); if (b) b.classList.toggle('active', S.timeline);
  const p = document.getElementById('tlPanel');
  if (S.timeline) { renderTimeline(); p.classList.add('open'); } else p.classList.remove('open');
}
function renderTimeline() {
  const body = document.getElementById('tlBody');
  const periods = TF.periodRange(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const starts = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const gName = S.groupBy === 'project' ? 'projet' : S.groupBy === 'role' ? 'rôle' : 'personne';
  const ttl = document.querySelector('#tlPanel .tlhead strong'); if (ttl) ttl.textContent = 'Timeline par ' + gName;
  document.getElementById('tlRange').textContent = '  ' + plabel(periods[0]) + ' → ' + plabel(periods[periods.length - 1]);
  const winStart = starts[0].getTime();
  const winEnd = TF.shiftPeriods(starts[starts.length - 1], S.granularity, 1).getTime();
  const span = (winEnd - winStart) || 1;
  // FOCUS = cellule ouverte dans la heatmap (clé = personne, ou composite "groupe|personne")
  const fKey = S._cellKey != null ? String(S._cellKey) : null;
  const fIdx = (fKey != null && S._cellPeriod) ? periods.indexOf(S._cellPeriod) : -1; // surlignage période seulement si une cellule est focalisée
  let bandStyle = '', bandS = 0, bandE = 0;
  if (fIdx >= 0) {
    bandS = starts[fIdx].getTime();
    bandE = (fIdx + 1 < starts.length ? starts[fIdx + 1].getTime() : winEnd);
    const bl = Math.max(0, (bandS - winStart) / span) * 100;
    const bw = Math.min(100, (bandE - winStart) / span * 100) - bl;
    bandStyle = 'left:' + bl.toFixed(1) + '%;width:' + bw.toFixed(1) + '%';
  }
  const kf = keyFn();            // même clé que la heatmap → filtre les tâches de chaque sous-ligne
  const grouped = S.groupBy !== 'person';
  const tasks = planTasks().filter(t => t.dateDebut != null && t.dateEcheance != null);
  const rows = buildRows();
  let h = '<div class="tl-axis"><div style="width:var(--res-col);flex:none"></div>';
  periods.forEach((p, i) => { h += '<div class="c' + (i === fIdx ? ' on' : '') + '">' + plabel(p) + '</div>'; });
  h += '</div>';
  let any = false, pending = null;
  for (const row of rows) {
    if (row.isHeader) { pending = row; continue; } // section projet/rôle : affichée si au moins une sous-ligne a des tâches
    const laneKey = String(row.key);
    const pid = row.teamId != null ? row.teamId : row.key;
    const mine = tasks
      .filter(t => effCharges(t).some(c => String(kf(t, c)) === laneKey))
      .filter(t => (t.dateEcheance * 1000) >= winStart && (t.dateDebut * 1000) <= winEnd)
      .sort((a, b) => a.dateDebut - b.dateDebut);
    if (!mine.length) continue;
    any = true;
    if (pending) { h += '<div class="tl-sec"><span class="gdot" style="background:' + pending.color + '"></span>' + esc(pending.label) + '</div>'; pending = null; }
    const isF = fKey != null && laneKey === fKey;
    const ini = row.label.split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    h += '<div class="tl-grp' + (grouped ? ' tl-ind' : '') + (isF ? ' tl-focus' : '') + '"' + (isF ? ' id="tlFocus"' : '') + ' data-lane="' + esc(laneKey) + '"><span class="tava" style="background:' + row.color + '">' + esc(ini) + '</span>' + esc(row.label) + ' · ' + mine.length + ' tâche' + (mine.length > 1 ? 's' : '') + '</div>';
    for (const t of mine) {
      const ts = t.dateDebut * 1000, te = t.dateEcheance * 1000;
      const l = Math.max(0, Math.min(1, (ts - winStart) / span)) * 100;
      const rr = Math.max(0, Math.min(1, (te - winStart) / span)) * 100;
      const w = Math.max(rr - l, 1.4);
      const col = (statusCfg.byValue[t.statut] || {}).fillColor || '#64748b';
      const hrs = (effCharges(t).find(c => String(c.teamId) === String(pid)) || {}).heures || 0;
      const hot = isF && fIdx >= 0 && ts < bandE && te > bandS; // tâche dans la période focalisée
      const tp = TF.periodKey(new Date(Math.max(ts, winStart)), S.granularity); // période à ouvrir si "Ajuster"
      h += '<div class="tl-row' + (grouped ? ' tl-ind' : '') + (isF ? ' tl-focus' : '') + '" data-lane="' + esc(laneKey) + '"><div class="tl-lbl" title="' + esc(t.titre) + '">' + esc(t.titre) + '</div><div class="tl-track">' + (bandStyle ? '<div class="tl-band" style="' + bandStyle + '"></div>' : '') + '<div class="tl-bar' + (hot ? ' hot' : '') + '" style="left:' + l.toFixed(1) + '%;width:' + w.toFixed(1) + '%;background:' + col + '" data-id="' + t.id + '" data-lane="' + esc(laneKey) + '" data-period="' + tp + '" title="' + esc(t.titre) + ' · ' + r1(hrs) + ' h — cliquer pour l’aperçu">' + esc(t.titre) + '</div></div></div>';
    }
  }
  if (!any) h += '<div class="tl-empty">Aucune tâche datée sur cette fenêtre.</div>';
  body.innerHTML = h;
  body.querySelectorAll('.tl-bar').forEach(b => b.addEventListener('mousedown', (e) => startBarDrag(e, b)));
  const fg = document.getElementById('tlFocus'); if (fg) fg.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// Drag d'une barre = REPLANIFIER (horizontal) ou RÉAFFECTER (vers une autre lane). Clic simple (sans drag) = aperçu.
function startBarDrag(e, bar) {
  if (e.button !== 0) return;
  const taskId = Number(bar.dataset.id), fromLane = bar.dataset.lane, period = bar.dataset.period;
  const track = bar.parentElement, trackW = track.clientWidth || 1;
  const starts = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const winStart = starts[0].getTime();
  const winEnd = TF.shiftPeriods(starts[starts.length - 1], S.granularity, 1).getTime();
  const totalDays = (winEnd - winStart) / 86400000;
  const startX = e.clientX, startY = e.clientY;
  let dragging = false;
  const clearTgt = () => document.querySelectorAll('.drop-tgt').forEach(n => n.classList.remove('drop-tgt'));
  function move(ev) {
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    if (!dragging && Math.abs(dx) + Math.abs(dy) > 4) { dragging = true; bar.classList.add('dragging'); document.body.style.cursor = 'grabbing'; closeTaskPop(); }
    if (!dragging) return;
    bar.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    clearTgt();
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const lane = el && el.closest('[data-lane]');
    if (lane && lane.dataset.lane !== fromLane) lane.classList.add('drop-tgt');
  }
  function up(ev) {
    document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up);
    document.body.style.cursor = ''; clearTgt();
    bar.classList.remove('dragging'); bar.style.transform = '';
    if (!dragging) { openTaskPop(taskId, bar, fromLane, period); return; }
    const ddays = Math.round((ev.clientX - startX) / trackW * totalDays);
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const laneEl = el && el.closest('[data-lane]');
    applyBarDrag(taskId, fromLane, laneEl ? laneEl.dataset.lane : fromLane, ddays);
  }
  document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  e.preventDefault();
}
async function applyBarDrag(taskId, fromLane, toLane, ddays) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const lanePid = l => { l = String(l); const i = l.indexOf('|'); return Number(i >= 0 ? l.slice(i + 1) : l); };
  const fromPid = lanePid(fromLane), toPid = lanePid(toLane);
  const reassign = !isNaN(toPid) && toPid && toPid !== fromPid && !!teamById(toPid);
  if (!reassign && !ddays) return;  // rien à faire (la barre est déjà remise en place)
  let newDebut = null, newEch = null;
  if (ddays && t.dateDebut != null && t.dateEcheance != null) { newDebut = gToInput(t.dateDebut + ddays * 86400); newEch = gToInput(t.dateEcheance + ddays * 86400); }
  // confirmation pour une réaffectation ou un gros déplacement (≥ 1 semaine)
  if (reassign || Math.abs(ddays) >= 7) {
    const parts = [];
    if (reassign) parts.push('Réaffecter « ' + t.titre + ' » de ' + ((teamById(fromPid) || {}).nom || '?') + ' à ' + ((teamById(toPid) || {}).nom || '?'));
    if (ddays) parts.push((reassign ? 'et décaler' : 'Décaler') + ' les dates de ' + (ddays > 0 ? '+' : '') + ddays + ' j');
    const ok = await confirmModal('Confirmer le déplacement', parts.join(' ') + ' ?');
    if (!ok) { render(); return; }
  }
  if (newDebut && newEch) setDates(taskId, newDebut, newEch);
  if (reassign) reassignCharge(taskId, fromPid, toPid);
}

// Aperçu d'une tâche (composant court repris du design UX/UI) : on sait de quoi il retourne avant d'ajuster.
function fmtTLDate(ts) { const d = new Date(ts * 1000); return d.getUTCDate() + ' ' + MOIS[d.getUTCMonth()]; }
const PRIO_TL = { 1: ['Critique', '#e5484d'], 2: ['Haute', '#f0982d'], 3: ['Moyenne', '#4c7ef3'], 4: ['Basse', '#8a97ab'] };
function delaiDays(t) { return (t.dateCloture && t.dateEcheance) ? Math.round((t.dateCloture - t.dateEcheance) / 86400) : 0; }
function delaiTxt(t) { const d = delaiDays(t); if (d > 0) return '+' + d + ' j de retard'; if (d < 0) return Math.abs(d) + ' j d’avance'; return 'à temps'; }
function taskCardHtml(t) {
  const p = projById(t.projet);
  const st = statusCfg.byValue[t.statut] || {};
  const pr = PRIO_TL[parseInt(t.priorite)] || PRIO_TL[3];
  const asg = getRefList(t.assignees).map(teamById).filter(Boolean);
  const prog = Math.max(0, Math.min(100, Number(t.progression) || 0));
  const dd = t.dateDebut ? fmtTLDate(t.dateDebut) : '—', de = t.dateEcheance ? fmtTLDate(t.dateEcheance) : '—';
  const totH = TF.parseCharges(t.charges).reduce((s, c) => s + c.heures, 0) || Number(t.estimationH) || 0;
  const ini = (n) => (n || '?').split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();
  return '<div class="tpc-badges"><span class="tpc-prio" style="background:' + pr[1] + '22;color:' + pr[1] + '">' + pr[0] + '</span>' +
    (st.label ? '<span class="tpc-status" style="background:' + (st.fillColor || '#64748b') + '22;color:' + (st.fillColor || '#94a3b8') + '">' + esc(st.label) + '</span>' : '') +
    (t.type === 'jalon' ? '<span class="tpc-mil">◆ Jalon</span>' : '') + '</div>' +
    '<div class="tpc-title">' + esc(t.titre) + '</div>' +
    '<div class="tpc-meta">' + (p ? '<span class="tpc-proj"><i style="background:' + p.couleur + '"></i>' + esc(p.nom) + '</span>' : '') + '<span class="tpc-dates">📅 ' + dd + ' → ' + de + '</span></div>' +
    '<div class="tpc-row"><div class="tpc-ava">' + asg.map(m => '<span class="tpc-av" style="background:' + (m.couleur || '#6366f1') + '" title="' + esc(m.nom) + '">' + esc(ini(m.nom)) + '</span>').join('') + '</div><div class="tpc-prog"><div class="tpc-track"><div style="width:' + prog + '%"></div></div><span>' + prog + '%</span></div></div>' +
    (totH ? '<div class="tpc-hours">' + r1(totH) + ' h alloué' + (asg.length > 1 ? 'es' : '') + '</div>' : '') +
    (t.dateCloture ? '<div class="tpc-cloture" style="color:' + (delaiDays(t) > 0 ? '#ff9094' : '#54d2a4') + '">✓ Clôturée le ' + fmtTLDate(t.dateCloture) + (t.dateEcheance ? ' · ' + delaiTxt(t) : '') + '</div>' : '');
}
function openTaskPop(taskId, anchor, lane, period) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const pop = document.getElementById('tlPop');
  const canAdj = S.mode === 'prevu' && lane != null;
  pop.innerHTML = taskCardHtml(t) + (canAdj ? '<div class="tpc-foot"><button class="tpc-adj">Ajuster ▸</button></div>' : '');
  pop.style.display = 'block';

function fmtCell(hr, capP) {
  if (!(hr > 0)) return '<span class="dot">·</span>';
  const pct = capP > 0 ? Math.round(hr / capP * 100) : 0;
  const txt = S.unit === 'pct' && capP > 0 ? pct + '%' : hr;
  return '<span class="v" style="background:' + heatBg(hr, capP) + '" title="' + hr + ' h' + (capP > 0 ? ' · ' + pct + '% de la capacité' : '') + '">' + txt + '</span>';
}
// Fond façon heatmap : teinte par seuil, intensité par taux (capP = capacité de la PÉRIODE).
function heatBg(hr, capP) {
  if (!(capP > 0)) return 'rgba(59,130,246,0.55)';
  const r = hr / capP;
  if (r > 1) return 'rgba(229,72,77,' + Math.min(0.7 + (r - 1) * 0.5, 0.96).toFixed(2) + ')';
  if (r > 0.85) return 'rgba(245,158,11,0.9)';
  return 'rgba(59,130,246,' + (0.16 + 0.62 * (r / 0.85)).toFixed(2) + ')';
}
// Mode Dispo : capacité disponible (cap - charge), échelle verte (plus c'est vert, plus il y a de marge).
function fmtDispo(free, capP) {
  if (!(free > 0.05)) return '<span class="dot">·</span>';
  const r = capP > 0 ? Math.min(free / capP, 1) : 0;
  return '<span class="v" style="background:rgba(21,160,107,' + (0.18 + 0.62 * r).toFixed(2) + ')" title="' + free + ' h disponibles' + (capP > 0 ? ' / ' + Math.round(capP) + 'h' : '') + '">' + free + '</span>';
}

// ============================================================================
// Drill cellule -> panel (liste des tâches composant la charge)
// ============================================================================
function tasksInCell(key, period) {
  const kf = keyFn(); const out = [];
  for (const t of planTasks()) {
    const charges = chargesFor(t);
    if (!charges.length || t.dateDebut == null || t.dateEcheance == null) continue;
    const d0 = Math.floor((t.dateDebut * 1000) / 86400000), d1 = Math.floor((t.dateEcheance * 1000) / 86400000);
    const days = []; for (let dd = d0; dd <= d1; dd++) { if (S.workdays) { const wd = new Date(dd * 86400000).getUTCDay(); if (wd < 1 || wd > 5) continue; } days.push(dd); }
    if (!days.length) days.push(d0);
    let slice = 0, total = 0;
    for (const c of charges) {
      if (String(kf(t, c)) !== String(key)) continue;
      total += c.heures;
      const perDay = c.heures / days.length;
      for (const dd of days) if (TF.periodKey(new Date(dd * 86400000), S.granularity) === period) slice += perDay;
    }
    if (slice > 0.01) out.push({ task: t, slice: r1(slice), total: r1(total) });
  }
  return out.sort((a, b) => b.slice - a.slice);
}

// Disponibilité par membre sur une période (charge TOTALE tous projets vs capacité) → guide la réaffectation.
function memberAvail(period) {
  const pr = TF.periodRange(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const ss = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const pi = pr.indexOf(period); const pstart = pi >= 0 ? ss[pi] : new Date();
  const mat = TF.chargeMatrix(planTasks(), (t, c) => String(c.teamId), S.granularity, effCharges, S.workdays);
  const out = {};
  for (const m of activeTeam()) {
    const load = (mat[String(m.id)] || {})[period] || 0;
    const cap = capPeriod(capOf(m)) * (1 - indispoFrac(m, pstart));
    out[m.id] = { load: r1(load), cap: r1(cap), free: r1(Math.max(cap - load, 0)) };
  }
  return out;
}
function openCell(key, period) {
  S._cellKey = key; S._cellPeriod = period; S._resId = null;
  const rows = buildRows(); const row = rows.find(r => String(r.key) === String(key));
  const items = tasksInCell(key, period);
  const tot = r1(items.reduce((s, i) => s + i.slice, 0));
  const editable = (S.groupBy === 'person' || (row && row.isSub)) && S.mode === 'prevu';
  const tid = row && row.teamId != null ? row.teamId : Number(key);
  const others = activeTeam().filter(m => m.id !== tid);
  const _starts = periodStarts(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon);
  const _pi = TF.periodRange(TF.shiftPeriods(new Date(), S.granularity, S.offset), S.granularity, S.horizon).indexOf(period);
  const capP = row && _pi >= 0 ? capForRow(row, _starts[_pi]) : 0;
  document.getElementById('pTitle').textContent = (row ? row.label : key) + ' — ' + plabel(period);
  const capTxt = capP > 0 ? ' · capacité ' + Math.round(capP) + 'h (' + Math.round(tot / capP * 100) + '%)' : '';
  document.getElementById('pSub').textContent = tot + (S.mode === 'realise' ? ' h réalisées' : ' h planifiées') + capTxt + (editable ? ' · allocation éditable' : '');
  const capWk = editable ? capOf(teamById(tid)) : 0;
  const av = editable ? memberAvail(period) : {};
  const per = S.granularity === 'month' ? 'période' : 'sem.';
  // bandeau d'état = le "point à traiter", lisible d'un coup d'œil

    const r = tot / capP;
    if (r > 1) banner = '<div class="pbanner over">⚠ Surcharge — <b>+' + r1(tot - capP) + ' h</b> au-dessus de la capacité (' + Math.round(capP) + ' h)</div>';
    else if (r > 0.85) banner = '<div class="pbanner warn">● Proche de la limite — ' + Math.round(r * 100) + '% · marge ' + r1(capP - tot) + ' h</div>';
    else if (tot > 0) banner = '<div class="pbanner ok">✓ Charge maîtrisée — ' + Math.round(r * 100) + '% · marge ' + r1(capP - tot) + ' h</div>';
    else banner = '<div class="pbanner under">○ Aucune charge — ' + Math.round(capP) + ' h disponibles</div>';
  }
  // guidage : quoi faire + où est la marge dans l'équipe (réaffectation éclairée)
  let hint = '';
  if (editable) {
    const free = others.filter(m => av[m.id] && av[m.id].free > 0.5).sort((a, b) => av[b.id].free - av[a.id].free).slice(0, 3);
    const freeTxt = free.length ? free.map(m => '<b>' + esc(m.nom.split(' ')[0]) + ' ' + av[m.id].free + ' h</b>').join(', ') : 'aucune marge dans l’équipe';
    hint = '<div class="phint">' + (tot > capP && capP > 0 ? 'Résorber : réduire les heures, replanifier les dates, ou réaffecter (⇄). ' : 'Ajustez heures, dates ou assignation. ') + 'Marge cette ' + per + ' : ' + freeTxt + '.</div>';
  }
  const sorted = items.slice().sort((a, b) => b.slice - a.slice); // la plus grosse contribution en premier
  const unitToggle = editable ? '<div class="unitbar">Allouer en <button class="' + (S.allocUnit === 'h' ? 'on' : '') + '" onclick="setAllocUnit(\'h\')">heures</button><button class="' + (S.allocUnit === 'pct' ? 'on' : '') + '" onclick="setAllocUnit(\'pct\')">% capacité</button></div>' : '';
  document.getElementById('pBody').innerHTML = banner + hint + unitToggle + (sorted.length ? sorted.map(i => {
    const p = projById(i.task.projet);
    const sliceTxt = (p ? esc(p.nom) : 'Sans projet') + ' · ' + i.slice + ' h cette ' + per;
    const usePct = editable && S.allocUnit === 'pct' && capWk > 0;
    const wks = taskWeeks(i.task);
    const val = usePct ? Math.round(i.total / (capWk * wks) * 100) : i.total;
    const conv = usePct ? '((parseFloat(this.value)||0)/100*' + capWk + '*' + wks.toFixed(3) + ')' : '(parseFloat(this.value)||0)';
    const right = editable
      ? '<div class="tkedit"><input type="number" name="alloc" min="0" step="' + (usePct ? 5 : 0.5) + '" value="' + val + '" title="Allocation ' + (usePct ? '(% de la capacité sur la durée)' : '(heures)') + '" onchange="setCharge(' + i.task.id + ',' + tid + ',' + conv + ')"><span class="u">' + (usePct ? '%' : 'h') + '</span><select name="reassign" title="Réaffecter à un membre (sa marge est indiquée)" onchange="if(this.value)reassignCharge(' + i.task.id + ',' + tid + ',parseInt(this.value))"><option value="">⇄</option>' + others.map(m => { const fr = av[m.id] ? av[m.id].free : null; return '<option value="' + m.id + '">→ ' + esc(m.nom) + (fr != null ? ' (' + fr + ' h libres)' : '') + '</option>'; }).join('') + '</select></div>'
      : '<div class="th">' + i.total + ' h</div>';
    const dates = editable ? '<div class="tkdates"><span class="dl">📅 Dates</span><input type="date" name="dateDebut" value="' + gToInput(i.task.dateDebut) + '" title="Début" onchange="setDates(' + i.task.id + ',this.value,null)"><span>→</span><input type="date" name="dateEcheance" value="' + gToInput(i.task.dateEcheance) + '" title="Échéance" onchange="setDates(' + i.task.id + ',null,this.value)"></div>' : '';
    return '<div class="tk"><div class="tkmain"><span class="pdot" style="background:' + (p ? p.couleur : '#64748b') + '"></span><div class="tinfo"><div class="tt">' + esc(i.task.titre) + '</div><div class="tm">' + sliceTxt + '</div></div>' + right + '</div>' + dates + '</div>';
  }).join('') : '<div style="color:var(--text-muted);font-size:.82rem">Aucune tâche ' + (S.mode === 'realise' ? 'réalisée' : 'planifiée') + ' sur cette période.</div>');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show'); document.body.classList.add('panel-open');
  // lien heatmap → cellule surlignée + timeline focalisée
  document.querySelectorAll('#gridwrap td.cell.sel').forEach(td => td.classList.remove('sel'));
  const _td = document.querySelector('#gridwrap td.cell[data-key="' + key + '"][data-period="' + period + '"]'); if (_td) _td.classList.add('sel');
  if (S.timeline) renderTimeline();
}

// Allocation éditable : agit sur Tasks.charges + COHÉRENCE assignés (option A) — recalcule la heatmap.
const toRefList = (ids) => (ids && ids.length) ? ['L'].concat(ids.map(Number)) : null;
async function persistTask(taskId, updates) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  Object.assign(t, updates); // optimiste
  if (!S.demo) { try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, updates]]); } catch (e) {} }
  render(); refreshCell();
}
function setCharge(taskId, teamId, heures) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const arr = TF.parseCharges(t.charges); const i = arr.findIndex(c => c.teamId === teamId);
  if (heures > 0) { if (i >= 0) arr[i].heures = heures; else arr.push({ teamId, heures }); } else if (i >= 0) arr.splice(i, 1);
  const updates = { charges: JSON.stringify(arr) };
  // cohérence : une charge implique d'être assigné
  if (heures > 0) { const asg = getRefList(t.assignees); if (!asg.includes(Number(teamId))) updates.assignees = toRefList(asg.concat([Number(teamId)])); }
  persistTask(taskId, updates);
}
function reassignCharge(taskId, fromId, toId) {
  if (fromId === toId) return;
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const arr = TF.parseCharges(t.charges); const fi = arr.findIndex(c => c.teamId === fromId); if (fi < 0) return;
  const hrs = arr[fi].heures; arr.splice(fi, 1);
  const ti = arr.findIndex(c => c.teamId === toId); if (ti >= 0) arr[ti].heures += hrs; else arr.push({ teamId: toId, heures: hrs });
  // cohérence assignés (option A) : + toId ; - fromId s'il n'a plus de charge sur la tâche
  let asg = getRefList(t.assignees);
  if (!asg.includes(Number(toId))) asg = asg.concat([Number(toId)]);
  if (!arr.some(c => Number(c.teamId) === Number(fromId))) asg = asg.filter(id => id !== Number(fromId));
  persistTask(taskId, { charges: JSON.stringify(arr), assignees: toRefList(asg) });
}
// Replanification depuis la vue : modifie les dates de la tâche (ré-étale la charge).
async function setDates(taskId, debut, echeance) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const upd = {};
  if (debut !== null) { t.dateDebut = inputToG(debut); upd.dateDebut = t.dateDebut; }
  if (echeance !== null) { t.dateEcheance = inputToG(echeance); upd.dateEcheance = t.dateEcheance; }
  if (!S.demo) { try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, upd]]); } catch (e) {} }
  render(); refreshCell();
}

// Charge par défaut : pour les tâches sans charge mais avec estimation + assignés, écrit estimationH ÷ nb assignés.
async function initCharges() {
  const targets = S.tasks.filter(t => !TF.parseCharges(t.charges).length && Number(t.estimationH) > 0 && getRefList(t.assignees).length);
  if (!targets.length) { toast('Aucune tâche à initialiser (estimation + assignés requis, charge vide).'); return; }
  if (!(await confirmModal('Initialiser la charge', targets.length + ' tâche(s) sans charge mais avec estimation + assignés.\nRépartir l’estimation ÷ nb assignés ?'))) return;
  const actions = [];
  for (const t of targets) { const asg = getRefList(t.assignees); const per = Math.round(Number(t.estimationH) / asg.length * 10) / 10; const j = JSON.stringify(asg.map(id => ({ teamId: id, heures: per }))); t.charges = j; actions.push(['UpdateRecord', 'Tasks', t.id, { charges: j }]); }
  if (!S.demo) { try { await grist.docApi.applyUserActions(actions); } catch (e) {} }
  render(); toast(targets.length + ' tâche(s) initialisée(s).');
}
// Export CSV (COPIL) de la grille courante.

// Le widget Plan est le CRÉATEUR UNIQUE de ses colonnes (sweet spot opt-in) : Team.capaciteHebdo/indispos
// + Tasks.charges/dateCloture. Les autres widgets ne créent rien — ils n'activent leurs bouts "charge"
// que si ces colonnes existent. Un doc qui n'ouvre jamais le Plan reste sans empreinte.
let _colsEnsured = false;
async function ensurePlanColumns(team, tasks) {
  if (_colsEnsured) return { team, tasks };
  const add = [];
  if (team && !('capaciteHebdo' in team)) add.push(['AddColumn', 'Team', 'capaciteHebdo', { type: 'Numeric' }]);
  if (team && !('indispos' in team)) add.push(['AddColumn', 'Team', 'indispos', { type: 'Text' }]);
  if (tasks && !('charges' in tasks)) add.push(['AddColumn', 'Tasks', 'charges', { type: 'Text' }]);
  if (tasks && !('dateCloture' in tasks)) add.push(['AddColumn', 'Tasks', 'dateCloture', { type: 'Date' }]);
  _colsEnsured = true; // garde anti-ré-entrance (onRecords rappelle loadGrist pendant l'await)
  if (!add.length) return { team, tasks };
  try {
    await grist.docApi.applyUserActions(add);
    const [t2, tm2] = await Promise.all([
      grist.docApi.fetchTable('Tasks').catch(() => tasks),
      grist.docApi.fetchTable('Team').catch(() => team)
    ]);
    return { team: tm2, tasks: t2 };
  } catch (e) { return { team, tasks }; }
}

  ];

}

bindToolbar();
// Hors Grist (ouverture directe, frame top) -> mode démo. Dans Grist -> iframe.
if (window.self === window.top) {
  loadDemo();
} else {
  try {
    grist.ready({ requiredAccess: 'full' });
    grist.onRecords(() => loadGrist());
    try { grist.onOptions((o) => { S.extFilters = (o && o.filters) || null; render(); }); } catch (e) {}
    loadGrist();
    setTimeout(() => { if (!S.team.length && !S.tasks.length) loadDemo(); }, 2500); // filet
  } catch (e) {
    loadDemo();
  }
}
