<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de charge - TaskFlow</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
:root{
  --bg:#0f172a; --surface:#1e293b; --surface-2:#243044; --surface-3:#2c3a52;
  --border:#334155; --text:#e2e8f0; --text-muted:#94a3b8; --primary:#6366f1;
  --ok:#3b82f6; --warn:#f59e0b; --over:#e5484d; --off:#475569; --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
.bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.title{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:700;color:var(--primary)}
.title .ic{font-size:1.2rem}
.spacer{flex:1}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.seg button{background:transparent;color:var(--text-muted);border:0;padding:5px 11px;cursor:pointer;font-size:0.82rem}
.seg button.on{background:var(--primary);color:#fff}
.btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 10px;cursor:pointer;font-size:0.82rem}
.btn:hover{background:var(--surface-3)}
.btn.ghost{background:transparent;color:var(--text-muted)}
.nav{display:inline-flex;align-items:center;gap:6px}
.nav .range{font-size:0.82rem;color:var(--text-muted);min-width:104px;text-align:center}
select.btn{appearance:none;padding-right:24px}
label.chk{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text-muted);cursor:pointer}
.alerts{padding:7px 14px;font-size:0.78rem;color:var(--text-muted);border-bottom:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap}
.alerts .warn{color:var(--warn)} .alerts .over{color:var(--over)}
.gridwrap{flex:1;overflow:auto;position:relative}
table.grid{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:0.8rem}
table.grid th,table.grid td{padding:0;border-bottom:1px solid var(--border)}
table.grid thead th{position:sticky;top:0;z-index:3;background:var(--surface);color:var(--text-muted);font-weight:600;padding:8px 8px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
table.grid thead th.now{color:var(--primary)}
.colres{position:sticky;left:0;z-index:2;background:var(--surface);text-align:left!important;min-width:190px;border-right:1px solid var(--border)}
thead th.colres{z-index:4}
.res{display:flex;align-items:center;gap:8px;padding:7px 10px}
.ava{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.66rem;font-weight:700;color:#fff;flex-shrink:0}
.res .nm{font-weight:600;white-space:nowrap}
.res .cap{color:var(--text-muted);font-size:0.72rem}
.cell{text-align:center;padding:0;cursor:pointer}
.cell .v{display:block;padding:6px 8px;font-weight:600;font-size:0.78rem;color:#fff;min-width:46px}
.cell .dot{display:block;padding:6px 8px;color:var(--off)}
.cell:hover .v{outline:2px solid rgba(255,255,255,.45);outline-offset:-2px}
.cell.nowcol,thead th.now,tfoot td.nowcol{box-shadow:inset 1px 0 var(--primary),inset -1px 0 var(--primary)}
thead th .pk{font-weight:700}
thead th .psub{font-weight:400;font-size:0.65rem;color:var(--off);margin-top:1px}
th.sum,td.sum{text-align:center;background:var(--surface-2);border-left:1px solid var(--border);white-space:nowrap;padding:6px 12px}
td.sum .sh{font-weight:700;font-size:0.8rem}
td.sum .sp{font-size:0.67rem;color:var(--text-muted)}
tfoot td{position:sticky;bottom:0;background:var(--surface-2);font-weight:600;color:var(--text);padding:7px 6px;text-align:center;border-top:1px solid var(--border)}
tfoot td.colres{background:var(--surface-2);z-index:2}
.legend{padding:8px 14px;display:flex;gap:16px;flex-wrap:wrap;font-size:0.74rem;color:var(--text-muted);border-top:1px solid var(--border)}
.legend .sw{display:inline-block;width:11px;height:11px;border-radius:2px;vertical-align:middle;margin-right:4px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%;color:var(--text-muted);text-align:center}
.empty .ic{font-size:2.4rem;opacity:.5}
/* panel slide-in (même primitive que les autres widgets) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:20}
.overlay.show{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:.22s;z-index:21;display:flex;flex-direction:column}
.panel.show{transform:none}
.panel .ph{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border)}
.panel .ph h3{font-size:0.98rem}
.panel .ph .sub{font-size:0.76rem;color:var(--text-muted);margin-top:2px}
.panel .pb{flex:1;overflow:auto;padding:12px 14px}
.tk{display:flex;flex-direction:column;gap:6px;padding:8px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.tk .tkmain{display:flex;align-items:center;gap:8px}
.unitbar{display:flex;align-items:center;gap:6px;font-size:0.76rem;color:var(--text-muted);margin-bottom:10px}
.unitbar button{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:0.74rem}
.unitbar button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.tk .tkdates{display:flex;align-items:center;gap:6px;padding-left:16px;flex-wrap:wrap}
.tk .tkdates .dl{font-size:0.8rem}
.tk .tkdates input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:2px 6px;font-size:0.72rem;color-scheme:dark}
.tk .tkdates span{color:var(--text-muted);font-size:0.74rem}
.tk .pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tk .tinfo{flex:1;min-width:0}
.tk .tt{font-weight:600;font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tk .tm{font-size:0.72rem;color:var(--text-muted)}
.tk .th{font-weight:700;font-size:0.84rem}
.tk .tkedit{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tk .tkedit input{width:50px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 6px;font-size:0.8rem}
.tk .tkedit .u{font-size:0.72rem;color:var(--text-muted)}
.tk .tkedit select{width:30px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:3px 2px;font-size:0.78rem;cursor:pointer}
.panel .pf{padding:12px 14px;border-top:1px solid var(--border)}
.x{background:transparent;border:0;color:var(--text-muted);font-size:1.3rem;cursor:pointer;line-height:1}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);background:var(--surface-3);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:0.8rem;opacity:0;pointer-events:none;transition:.2s;z-index:30;max-width:80vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.colres.clk{cursor:pointer}
.colres.clk:hover{background:var(--surface-3)}
.cell.redu{background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(71,85,105,.28) 5px,rgba(71,85,105,.28) 10px)}
.rl{font-size:0.78rem;color:var(--text-muted);font-weight:600}
.capedit{display:flex;align-items:center;gap:8px;margin-top:6px}
.capedit input{width:74px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:0.85rem}
.capedit .u{color:var(--text-muted);font-size:0.8rem}
.indispo{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;margin-top:6px}
.indispo .il{font-weight:600;font-size:0.8rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.indispo .id{font-size:0.72rem;color:var(--text-muted);white-space:nowrap}
.indispo .ix{background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:1.1rem;line-height:1}
.indispo-add{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.indispo-add>input[type=text]{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:0.8rem}
.indispo-add .dd{display:flex;align-items:center;gap:6px}
.indispo-add .dd input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 6px;font-size:0.74rem;color-scheme:dark}
.indispo-add .dd span{color:var(--text-muted)}
</style>
</head>
<body>
<div id="app">
  <div class="bar">
    <div class="title"><span class="ic">▦</span> Plan de charge</div>
    <div class="seg" id="segGran"></div>
    <div class="nav">
      <button class="btn ghost" id="navPrev">◀</button>
      <span class="range" id="navRange">—</span>
      <button class="btn ghost" id="navNext">▶</button>
      <button class="btn ghost" id="navToday" style="display:none">Aujourd'hui</button>
    </div>
    <div class="spacer"></div>
    <label class="chk"><span>Grouper</span>
      <select class="btn" id="selGroup">
        <option value="person">Personne</option>
        <option value="project">Projet</option>
        <option value="role">Rôle</option>
      </select>
    </label>
    <div class="seg" id="segMode"></div>
    <div class="seg" id="segUnit"></div>
    <label class="chk"><input type="checkbox" id="chkDone"> Inclure terminé</label>
    <label class="chk" title="Estimer la charge des tâches sans charge à partir de leur estimation ÷ nb assignés"><input type="checkbox" id="chkDerive"> Estimer</label>
    <label class="chk" title="Étaler la charge sur les jours ouvrés (lun-ven) seulement"><input type="checkbox" id="chkWorkdays"> Jours ouvrés</label>
    <button class="btn" id="btnExport">Export</button>
  </div>
  <div class="alerts" id="alerts"></div>
  <div class="gridwrap" id="gridwrap"><div class="empty"><div class="ic">▦</div><div>Chargement…</div></div></div>
  <div class="legend">
    <span><span class="sw" style="background:var(--ok)"></span>charge OK</span>
    <span><span class="sw" style="background:var(--warn)"></span>&gt; 85% capacité</span>
    <span><span class="sw" style="background:var(--over)"></span>surcharge</span>
    <span><span class="sw" style="background:var(--off)"></span>capacité réduite</span>
    <span>· = aucune charge</span>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="ph">
    <div><h3 id="pTitle">Détail</h3><div class="sub" id="pSub"></div></div>
    <button class="x" id="pClose">×</button>
  </div>
  <div class="pb" id="pBody"></div>
  <div class="pf"><button class="btn" id="pGantt" style="width:100%">↗ Ouvrir dans le Gantt</button></div>
</div>
<div id="toast" class="toast"></div>

<script>
"use strict";

// <taskflow-core> -- GENERE par scripts/build-taskflow.js, NE PAS EDITER ICI
/* ============================================================================
 * taskflow-core.js — Module commun aux widgets TaskFlow
 * ----------------------------------------------------------------------------
 * SOURCE UNIQUE. Inline dans chaque widget par scripts/build-taskflow.js entre
 * les marqueurs de generation prevus a cet effet.
 * NE PAS editer la copie inlinee dans les .html : editer CE fichier puis lancer
 *   npm run build:taskflow
 *
 * Expose un objet `TF` (namespace) pour ne jamais entrer en collision avec les
 * helpers locaux existants des widgets. Toutes les fonctions qui ecrivent dans
 * Grist sont DEFENSIVES : en cas d'echec elles n'interrompent jamais le widget
 * (au pire, comportement actuel inchange).
 * ========================================================================== */
const TF = (function () {
    'use strict';

    /* ----- Statuts ---------------------------------------------------------
     * Convention : l'ORDRE fait foi. Le DERNIER statut de la liste est l'etat
     * terminal ("termine") utilise par la logique de completion des widgets.
     * Les statuts reels proviennent de la colonne Choice `statut` (editable par
     * l'utilisateur dans Grist). DEFAULT_STATUSES n'est qu'un repli.
     * --------------------------------------------------------------------- */
    const DEFAULT_STATUSES = [
        { value: 'todo',       label: 'À faire',  fillColor: '#94a3b8', textColor: '#ffffff' },
        { value: 'inprogress', label: 'En cours', fillColor: '#f59e0b', textColor: '#ffffff' },
        { value: 'review',     label: 'En revue', fillColor: '#3b82f6', textColor: '#ffffff' },
        { value: 'done',       label: 'Terminé',  fillColor: '#10b981', textColor: '#ffffff' }
    ];
    // Repli libelle + couleur pour les CODES par defaut. Permet d'afficher un libelle
    // FR (et la bonne couleur) meme quand la colonne Choice stocke le code brut
    // (todo/inprogress/...). Une valeur renommee par l'utilisateur garde SON libelle.
    const DEFAULTS_BY_VALUE = {};
    for (var _i = 0; _i < DEFAULT_STATUSES.length; _i++) DEFAULTS_BY_VALUE[DEFAULT_STATUSES[_i].value] = DEFAULT_STATUSES[_i];

    // Convertit un tableau Grist colonnaire en tableau d'objets lignes.
    function columnarToRows(data) {
        if (!data || Array.isArray(data)) return data || [];
        const cols = Object.keys(data);
        if (!cols.length) return [];
        const n = (data[cols[0]] && data[cols[0]].length) || 0;
        const rows = [];
        for (let i = 0; i < n; i++) {
            const rec = {};
            for (const k of cols) rec[k] = data[k][i];
            rows.push(rec);
        }
        return rows;
    }

    // Resout le rowId d'une table depuis son tableId via _grist_Tables.
    async function tableRowId(grist, tableId) {
        const meta = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
        const row = meta.find(r => r.tableId === tableId);
        return row ? row.id : null;
    }

    // Construit une config de statuts normalisee depuis une liste brute.
    function buildStatusConfig(list, source) {
        const clean = (list || []).filter(s => s && s.value != null).map(s => {
            const v = String(s.value);
            const d = DEFAULTS_BY_VALUE[v];
            const hasExplicitLabel = s.label != null && s.label !== '' && String(s.label) !== v;
            return {
                value: v,
                label: hasExplicitLabel ? String(s.label) : (d ? d.label : v),
                fillColor: s.fillColor || (d ? d.fillColor : '#94a3b8'),
                textColor: s.textColor || (d ? d.textColor : '#ffffff')
            };
        });
        const final = clean.length ? clean : DEFAULT_STATUSES.slice();
        const byValue = {};
        for (const s of final) byValue[s.value] = s;
        return {
            list: final,
            byValue,
            values: final.map(s => s.value),
            terminalValue: final[final.length - 1].value, // convention "dernier = termine"
            firstValue: final[0].value,
            source: clean.length ? source : 'default'
        };
    }

    /* Lit les statuts (libelles + couleurs + ordre) depuis la colonne Choice
     * indiquee, via les metadonnees Grist. Repli en cascade :
     *   1. options de la colonne Choice (cas ideal)
     *   2. valeurs distinctes presentes dans les donnees (colonne Text)
     *   3. DEFAULT_STATUSES
     * Ne jette jamais : retourne toujours une config exploitable.
     */
    async function loadStatusConfig(grist, table, column, distinctFallback) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid != null) {
                const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
                const col = cols.find(c => c.parentId === tid && c.colId === column);
                if (col && col.widgetOptions) {
                    let opt = {};
                    try { opt = JSON.parse(col.widgetOptions) || {}; } catch (e) { opt = {}; }
                    const choices = Array.isArray(opt.choices) ? opt.choices : [];
                    const co = opt.choiceOptions || {};
                    if (choices.length) {
                        return buildStatusConfig(choices.map(ch => ({
                            value: ch,
                            label: ch,
                            fillColor: co[ch] && co[ch].fillColor,
                            textColor: co[ch] && co[ch].textColor
                        })), 'choice');
                    }
                }
            }
        } catch (e) { /* repli silencieux */ }

        if (Array.isArray(distinctFallback) && distinctFallback.length) {
            const seen = [];
            for (const v of distinctFallback) { if (v != null && v !== '' && seen.indexOf(v) === -1) seen.push(v); }
            if (seen.length) return buildStatusConfig(seen.map(v => ({ value: v, label: v })), 'data');
        }
        return buildStatusConfig(DEFAULT_STATUSES.slice(), 'default');
    }

    function getStatus(cfg, value) {
        if (cfg && cfg.byValue && cfg.byValue[value]) return cfg.byValue[value];
        return { value: value, label: value || '', fillColor: '#94a3b8', textColor: '#ffffff' };
    }
    function isTerminal(cfg, value) { return !!cfg && value === cfg.terminalValue; }

    /* Seme les options (choix + couleurs) sur une colonne Choice si elle n'en a
     * pas encore. Defensif. A appeler depuis ensureSchema apres creation.
     */
    async function seedStatusChoices(grist, table, column, statuses) {
        try {
            const tid = await tableRowId(grist, table);
            if (tid == null) return;
            const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            const col = cols.find(c => c.parentId === tid && c.colId === column);
            if (!col) return;
            let opt = {};
            try { opt = JSON.parse(col.widgetOptions || '{}') || {}; } catch (e) { opt = {}; }
            if (Array.isArray(opt.choices) && opt.choices.length) return; // deja configure : on respecte
            const list = statuses && statuses.length ? statuses : DEFAULT_STATUSES;
            const choiceOptions = {};
            for (const s of list) choiceOptions[s.value] = { fillColor: s.fillColor, textColor: s.textColor };
            const widgetOptions = JSON.stringify({ choices: list.map(s => s.value), choiceOptions: choiceOptions });
            await grist.docApi.applyUserActions([['ModifyColumn', table, column, { widgetOptions: widgetOptions }]]);
        } catch (e) { console.warn('TF.seedStatusChoices:', e && e.message); }
    }

    /* ----- #2 : colonnes d'affichage des Ref (noms au lieu des IDs) ---------
     * Pose le visibleCol + la display formula sur des colonnes Ref pour que les
     * VUES NATIVES Grist affichent un libelle plutot que l'ID de ligne.
     * specs : [{ table:'Tasks', column:'projet', visibleColId:'nom' }, ...]
     * DEFENSIF : si Grist refuse une action, on log et on continue ; au pire
     * l'affichage reste en IDs (comportement actuel), jamais de casse.
     * --------------------------------------------------------------------- */
    async function setRefDisplayColumns(grist, specs) {
        if (!Array.isArray(specs) || !specs.length) return;
        try {
            const tables = columnarToRows(await grist.docApi.fetchTable('_grist_Tables'));
            const cols = columnarToRows(await grist.docApi.fetchTable('_grist_Tables_column'));
            const tidOf = (tableId) => { const r = tables.find(t => t.tableId === tableId); return r ? r.id : null; };
            const colOf = (tableRow, colId) => cols.find(c => c.parentId === tableRow && c.colId === colId);

            const actions = [];
            for (const s of specs) {
                const srcTid = tidOf(s.table);
                if (srcTid == null) continue;
                const refCol = colOf(srcTid, s.column);
                if (!refCol) continue;
                // Table cible deduite du type "Ref:Target" / "RefList:Target".
                const m = /^(?:Ref|RefList):(.+)$/.exec(refCol.type || '');
                if (!m) continue;
                const targetTid = tidOf(m[1]);
                if (targetTid == null) continue;
                const visCol = colOf(targetTid, s.visibleColId);
                if (!visCol) continue;
                // Eviter de re-poser si deja correct.
                if (refCol.visibleCol === visCol.id) continue;
                actions.push(['SetDisplayFormula', s.table, null, refCol.id, '$' + s.column + '.' + s.visibleColId]);
                actions.push(['UpdateRecord', '_grist_Tables_column', refCol.id, { visibleCol: visCol.id }]);
            }
            if (actions.length) await grist.docApi.applyUserActions(actions);
        } catch (e) { console.warn('TF.setRefDisplayColumns:', e && e.message); }
    }

    /* ----- #3 : plan de charge (heures par personne) ------------------------
     * Stockage : colonne Text `charges` sur Tasks, JSON [{teamId, heures}].
     * Parse defensif identique au pattern subtasks.
     * --------------------------------------------------------------------- */
    function parseCharges(v) {
        try {
            const a = JSON.parse(v || '[]');
            if (!Array.isArray(a)) return [];
            return a.filter(x => x && x.teamId != null)
                    .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
                    .filter(x => !isNaN(x.teamId));
        } catch (e) { return []; }
    }
    function chargesToJson(arr) {
        return JSON.stringify((arr || [])
            .filter(x => x && x.teamId != null)
            .map(x => ({ teamId: Number(x.teamId), heures: Number(x.heures) || 0 }))
            .filter(x => !isNaN(x.teamId)));
    }
    // Heures totales d'une tache (somme des charges par personne).
    function chargeTotal(charges) { return parseCharges(typeof charges === 'string' ? charges : JSON.stringify(charges || [])).reduce((s, c) => s + c.heures, 0); }
    // Agrege la charge par membre sur une liste de taches (chaque tache expose .charges).
    function chargeByMember(tasks) {
        const by = {};
        for (const t of (tasks || [])) {
            for (const c of parseCharges(t && t.charges)) {
                by[c.teamId] = (by[c.teamId] || 0) + c.heures;
            }
        }
        return by;
    }

    // Cle de periode : semaine ISO 'YYYY-Www' ou mois 'YYYY-MM'.
    function periodKey(date, granularity) {
        if (granularity === 'month') {
            return date.getUTCFullYear() + '-' + String(date.getUTCMonth() + 1).padStart(2, '0');
        }
        const d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
        const day = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return d.getUTCFullYear() + '-W' + String(week).padStart(2, '0');
    }

    // #3 plan de charge temporel : etale les charges PROPRES de chaque tache sur sa
    // duree (jours calendaires), agrege par personne et par periode.
    // dateDebut/dateEcheance = timestamps Unix SECONDES (Grist). Tache sans dates ou
    // sans charge = ignoree. Retourne { teamId: { periodKey: heures } }.
    function chargeByMemberPeriod(tasks, granularity) {

            const s = t.dateDebut, e = t.dateEcheance;
            if (s == null || e == null) continue;

            const day1 = Math.floor((e * 1000) / 86400000);
            const nDays = Math.max(day1 - day0 + 1, 1);
            for (const c of charges) {
                const perDay = (Number(c.heures) || 0) / nDays;
                if (!perDay) continue;

    }

    // Decale une date de n periodes (semaine = 7 jours, mois = 1 mois).
    function shiftPeriods(date, granularity, n) {

        return d;
    }

    // Liste contigue de cles de periode (semaine ISO ou mois) a partir d'une date,
    // alignee sur le debut de periode (lundi / 1er du mois). Inclut les periodes vides.
    function periodRange(startDate, granularity, count) {

            out.push(periodKey(d, g));

        }
        return out;
    }

    // chargeMatrix : generalise chargeByMemberPeriod. Etale les charges (via getCharges,
    // defaut parseCharges) sur la duree, agrege par cle keyFn(t, charge) et periode.
    function chargeMatrix(tasks, keyFn, granularity, getCharges, workdays) {

            }

    }

// ============================================================================
// État
// ============================================================================
const S = {
  tasks: [], team: [], projects: [],
  granularity: 'week', offset: 0, horizon: 12,
  groupBy: 'person', unit: 'pct', includeDone: false, derive: false, mode: 'prevu', workdays: false, allocUnit: 'h',
  terminalStatuts: ['done', 'termine', 'terminé'],
  demo: false

// Utils
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const getRefList = (v) => Array.isArray(v) && v[0] === 'L' ? v.slice(1).map(Number) : [];
const teamById = (id) => S.team.find(m => m.id === id);
const projById = (id) => S.projects.find(p => p.id === id);
const activeTeam = () => S.team.filter(m => m.actif !== false);
const isTerminal = (t) => S.terminalStatuts.includes(String(t.statut || '').toLowerCase());
const capOf = (m) => (Number(m && m.capaciteHebdo) > 0 ? Number(m.capaciteHebdo) : 35);
const capPeriod = (cap) => S.granularity === 'month' ? cap * 52 / 12 : cap;
const plabel = (p) => S.granularity === 'month' ? (p.slice(5) + '/' + p.slice(2, 4)) : ('S' + p.slice(6));
const MOIS = ['janv', 'févr', 'mars', 'avr', 'mai', 'juin', 'juil', 'août', 'sept', 'oct', 'nov', 'déc'];
function periodStarts(start, g, count) {
  let d = new Date(Date.UTC(start.getUTCFullYear(), start.getUTCMonth(), start.getUTCDate()));
  if (g === 'week') { const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() - day + 1); } else { d = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1)); }
  const out = []; for (let i = 0; i < count; i++) { out.push(new Date(d)); if (g === 'week') d.setUTCDate(d.getUTCDate() + 7); else d.setUTCMonth(d.getUTCMonth() + 1); } return out;
}
function subLabel(d) { return S.granularity === 'month' ? '' : (d.getUTCDate() + ' ' + MOIS[d.getUTCMonth()]); }
const r1 = (n) => Math.round(n * 10) / 10;

function planTasks() { return S.includeDone ? S.tasks : S.tasks.filter(t => !isTerminal(t)); }
// Charges effectives : réelles, ou dérivées de estimationH ÷ nb assignés si l'option est active.
function effCharges(t) {
  const c = TF.parseCharges(t.charges);
  if (c.length || !S.derive) return c;
  const est = Number(t.estimationH) || 0, asg = getRefList(t.assignees);
  return (est > 0 && asg.length) ? asg.map(id => ({ teamId: id, heures: est / asg.length })) : [];
}
// Réalisé : répartit tempsPasse de la tâche au prorata des charges propres par personne.
function realCharges(t) {
  const cs = effCharges(t); const tot = cs.reduce((s, c) => s + c.heures, 0); const tp = Number(t.tempsPasse) || 0;
  if (!tot || !tp) return []; return cs.map(c => ({ teamId: c.teamId, heures: c.heures * tp / tot }));
}
function chargesFor(t) { return S.mode === 'realise' ? realCharges(t) : effCharges(t); }
const taskWeeks = (t) => Math.max((Math.floor(t.dateEcheance * 1000 / 86400000) - Math.floor(t.dateDebut * 1000 / 86400000) + 1) / 7, 1 / 7);
const gToInput = (ts) => ts ? new Date(ts * 1000).toISOString().slice(0, 10) : '';
const inputToG = (s) => s ? Math.floor(Date.parse(s + 'T00:00:00Z') / 1000) : null;
function tasksForKey(key) {
  if (S.groupBy === 'project') return planTasks().filter(t => String(t.projet || '0') === String(key)).map(t => t.id);
  if (S.groupBy === 'person') return planTasks().filter(t => getRefList(t.assignees).includes(Number(key))).map(t => t.id);
  return [];
}
function toast(msg) { const el = document.getElementById('toast'); if (!el) return; el.textContent = msg; el.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => el.classList.remove('show'), 2800); }

function keyFn() {
  if (S.groupBy === 'project') return (t) => t.projet ? String(t.projet) : '0';
  if (S.groupBy === 'role') return (t, c) => { const m = teamById(c.teamId); return (m && m.role) ? m.role : '—'; };
  return (t, c) => String(c.teamId);
}

// Lignes (ressources/groupes) avec libellé + capacité nominale + membres (pour la capacité par période)
function buildRows() {
  if (S.groupBy === 'project') {
    const ps = {}; for (const t of planTasks()) { const k = t.projet ? String(t.projet) : '0'; if (!ps[k]) { const p = projById(t.projet); ps[k] = { key: k, label: p ? p.nom : 'Sans projet', color: p ? p.couleur : '#64748b', cap: 0, members: [] }; } }
    return Object.values(ps);
  }
  if (S.groupBy === 'role') {
    const rs = {}; for (const m of activeTeam()) { const r = m.role || '—'; if (!rs[r]) rs[r] = { key: r, label: r, color: '#6366f1', cap: 0, members: [] }; rs[r].cap += capOf(m); rs[r].members.push(m); }
    return Object.values(rs);
  }
  return activeTeam().map(m => ({ key: String(m.id), label: m.nom, color: m.couleur || '#6366f1', cap: capOf(m), members: [m] }));
}

// Indisponibilités (Team.indispos JSON [{start,end,label}], dates ISO yyyy-mm-dd) -> capacité réduite par période.
function parseIndispos(v) { try { const a = JSON.parse(v || '[]'); return Array.isArray(a) ? a.filter(x => x && x.start && x.end) : []; } catch (e) { return []; } }
const dayIdx = (s) => Math.floor(Date.parse(s + 'T00:00:00Z') / 86400000);
function periodDays(periodStart) { return S.granularity === 'month' ? new Date(Date.UTC(periodStart.getUTCFullYear(), periodStart.getUTCMonth() + 1, 0)).getUTCDate() : 7; }
function indispoFrac(member, periodStart) {
  const ind = parseIndispos(member && member.indispos); if (!ind.length) return 0;
  const p0 = Math.floor(periodStart.getTime() / 86400000), days = periodDays(periodStart);
  let cnt = 0;
  for (let d = p0; d < p0 + days; d++) { for (const iv of ind) { if (d >= dayIdx(iv.start) && d <= dayIdx(iv.end)) { cnt++; break; } } }
  return Math.min(cnt / days, 1);
}
// Capacité d'une ligne sur une période donnée (heures), ajustée des indisponibilités.
function capForRow(row, periodStart) {
  return (row.members || []).reduce((s, m) => s + capPeriod(capOf(m)) * (1 - indispoFrac(m, periodStart)), 0);
}
function rowReduced(row, periodStart) { return (row.members || []).some(m => indispoFrac(m, periodStart) > 0); }

function cellColor(h, cap) {
  if (!(h > 0)) return 'transparent';
  if (!(cap > 0)) return 'var(--ok)';
  const r = h / cap; return r > 1 ? 'var(--over)' : r > 0.85 ? 'var(--warn)' : 'var(--ok)';
}

// ============================================================================
// Rendu

function render() {

  wrap.querySelectorAll('td.colres.clk').forEach(td => td.addEventListener('click', () => openResource(td.dataset.res)));

}

function fmtCell(hr, capP) {
  if (!(hr > 0)) return '<span class="dot">·</span>';
  const pct = capP > 0 ? Math.round(hr / capP * 100) : 0;
  const txt = S.unit === 'pct' && capP > 0 ? pct + '%' : hr;
  return '<span class="v" style="background:' + heatBg(hr, capP) + '" title="' + hr + ' h' + (capP > 0 ? ' · ' + pct + '% de la capacité' : '') + '">' + txt + '</span>';

// ============================================================================
// Drill cellule -> panel (liste des tâches composant la charge)

function tasksInCell(key, period) {
  const kf = keyFn(); const out = [];
  for (const t of planTasks()) {
    const charges = chargesFor(t);
    if (!charges.length || t.dateDebut == null || t.dateEcheance == null) continue;
    const d0 = Math.floor((t.dateDebut * 1000) / 86400000), d1 = Math.floor((t.dateEcheance * 1000) / 86400000);
    const days = []; for (let dd = d0; dd <= d1; dd++) { if (S.workdays) { const wd = new Date(dd * 86400000).getUTCDay(); if (wd < 1 || wd > 5) continue; } days.push(dd); }
    if (!days.length) days.push(d0);
    let slice = 0, total = 0;
    for (const c of charges) {
      if (String(kf(t, c)) !== String(key)) continue;
      total += c.heures;
      const perDay = c.heures / days.length;
      for (const dd of days) if (TF.periodKey(new Date(dd * 86400000), S.granularity) === period) slice += perDay;
    }
    if (slice > 0.01) out.push({ task: t, slice: r1(slice), total: r1(total) });

}

    const conv = usePct ? '((parseFloat(this.value)||0)/100*' + capWk + '*' + wks.toFixed(3) + ')' : '(parseFloat(this.value)||0)';
    const right = editable
      ? '<div class="tkedit"><input type="number" min="0" step="' + (usePct ? 5 : 0.5) + '" value="' + val + '" title="Allocation ' + (usePct ? '(% de la capacité sur la durée)' : '(heures)') + '" onchange="setCharge(' + i.task.id + ',' + tid + ',' + conv + ')"><span class="u">' + (usePct ? '%' : 'h') + '</span><select title="Réaffecter à un autre membre" onchange="if(this.value)reassignCharge(' + i.task.id + ',' + tid + ',parseInt(this.value))"><option value="">⇄</option>' + others.map(m => '<option value="' + m.id + '">→ ' + esc(m.nom) + '</option>').join('') + '</select></div>'
      : '<div class="th">' + i.total + ' h</div>';
    const dates = editable ? '<div class="tkdates"><span class="dl">📅</span><input type="date" value="' + gToInput(i.task.dateDebut) + '" title="Début" onchange="setDates(' + i.task.id + ',this.value,null)"><span>→</span><input type="date" value="' + gToInput(i.task.dateEcheance) + '" title="Échéance" onchange="setDates(' + i.task.id + ',null,this.value)"></div>' : '';
    return '<div class="tk"><div class="tkmain"><span class="pdot" style="background:' + (p ? p.couleur : '#64748b') + '"></span><div class="tinfo"><div class="tt">' + esc(i.task.titre) + '</div><div class="tm">' + sliceTxt + '</div></div>' + right + '</div>' + dates + '</div>';
  }).join('') : '<div style="color:var(--text-muted);font-size:.82rem">Aucune tâche ' + (S.mode === 'realise' ? 'réalisée' : 'planifiée') + ' sur cette période.</div>');
  document.getElementById('pGantt').onclick = () => openInGantt(key);
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
}
function closePanel() { S._cellKey = null; S._resId = null; document.getElementById('pGantt').style.display = ''; document.getElementById('overlay').classList.remove('show'); document.getElementById('panel').classList.remove('show'); }
function refreshCell() { if (S._cellKey != null) openCell(S._cellKey, S._cellPeriod); }
function setAllocUnit(u) { S.allocUnit = u; refreshCell(); }
// Allocation éditable : agit sur la charge PROPRE (Tasks.charges) — recalcule la heatmap.
async function persistCharges(taskId, arr) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  t.charges = JSON.stringify(arr);
  if (!S.demo) { try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, { charges: t.charges }]]); } catch (e) {} }
  render(); refreshCell();
}
function setCharge(taskId, teamId, heures) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const arr = TF.parseCharges(t.charges); const i = arr.findIndex(c => c.teamId === teamId);
  if (heures > 0) { if (i >= 0) arr[i].heures = heures; else arr.push({ teamId, heures }); } else if (i >= 0) arr.splice(i, 1);
  persistCharges(taskId, arr);
}
function reassignCharge(taskId, fromId, toId) {
  if (fromId === toId) return;
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const arr = TF.parseCharges(t.charges); const fi = arr.findIndex(c => c.teamId === fromId); if (fi < 0) return;
  const hrs = arr[fi].heures; arr.splice(fi, 1);
  const ti = arr.findIndex(c => c.teamId === toId); if (ti >= 0) arr[ti].heures += hrs; else arr.push({ teamId: toId, heures: hrs });
  persistCharges(taskId, arr);
}
// Replanification depuis la vue : modifie les dates de la tâche (ré-étale la charge).
async function setDates(taskId, debut, echeance) {
  const t = S.tasks.find(x => x.id === taskId); if (!t) return;
  const upd = {};
  if (debut !== null) { t.dateDebut = inputToG(debut); upd.dateDebut = t.dateDebut; }
  if (echeance !== null) { t.dateEcheance = inputToG(echeance); upd.dateEcheance = t.dateEcheance; }
  if (!S.demo) { try { await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', taskId, upd]]); } catch (e) {} }
  render(); refreshCell();
}
function openInGantt(key) {
  // Réutilise le Gantt de la suite : diffuse un filtre (setOptions) + sélectionne les lignes.
  let filters = null;
  if (S.groupBy === 'person') filters = { assignee: [Number(key)] };
  else if (S.groupBy === 'project') filters = { project: Number(key) };
  try { if (window.grist && grist.widgetApi && grist.widgetApi.setOptions) grist.widgetApi.setOptions({ filters }); } catch (e) {}
  try { const ids = tasksForKey(key); if (window.grist && grist.setSelectedRows && ids.length) grist.setSelectedRows(ids); } catch (e) {}
  const who = S.groupBy === 'person' ? ((teamById(Number(key)) || {}).nom || key) : (S.groupBy === 'project' ? ((projById(Number(key)) || {}).nom || key) : key);
  toast('Filtre « ' + who + ' » diffusé à la suite — ouvre le Gantt pour le voir.');
}

// 2.1 — panneau ressource : capacité hebdo + indisponibilités (Team.capaciteHebdo / Team.indispos).
function openResource(key) {
  const m = teamById(Number(key)); if (!m) return;
  S._cellKey = null; S._resId = m.id;
  const ind = parseIndispos(m.indispos);
  document.getElementById('pTitle').textContent = m.nom;
  document.getElementById('pSub').textContent = 'Capacité & disponibilités';
  let html = '<div class="rl">Capacité hebdomadaire</div><div class="capedit"><input type="number" min="0" step="1" value="' + capOf(m) + '" onchange="setCapacity(' + m.id + ',parseFloat(this.value)||0)"><span class="u">h / semaine</span></div>';
  html += '<div class="rl" style="margin-top:16px">Indisponibilités (congés, fériés)</div>';
  html += ind.length ? ind.map((iv, idx) => '<div class="indispo"><span class="il">' + esc(iv.label || 'Indispo') + '</span><span class="id">' + esc(iv.start) + ' → ' + esc(iv.end) + '</span><button class="ix" title="Retirer" onclick="removeIndispo(' + m.id + ',' + idx + ')">×</button></div>').join('') : '<div style="color:var(--text-muted);font-size:.8rem;margin:6px 0">Aucune indisponibilité.</div>';
  html += '<div class="indispo-add"><input type="text" id="indLabel" placeholder="Libellé (ex. Congés)"><div class="dd"><input type="date" id="indStart"><span>→</span><input type="date" id="indEnd"></div><button class="btn" onclick="addIndispo(' + m.id + ')">+ Ajouter</button></div>';
  document.getElementById('pBody').innerHTML = html;
  document.getElementById('pGantt').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
}
async function setCapacity(memberId, val) {
  const m = teamById(memberId); if (!m) return;
  m.capaciteHebdo = val > 0 ? val : null;
  if (!S.demo) { try { await grist.docApi.applyUserActions([['UpdateRecord', 'Team', memberId, { capaciteHebdo: m.capaciteHebdo }]]); } catch (e) {} }
  render();
}
async function persistIndispos(memberId, arr) {
  const m = teamById(memberId); if (!m) return;
  m.indispos = JSON.stringify(arr);
  if (!S.demo) { try { await grist.docApi.applyUserActions([['UpdateRecord', 'Team', memberId, { indispos: m.indispos }]]); } catch (e) {} }
  render(); if (S._resId === memberId) openResource(String(memberId));
}
function addIndispo(memberId) {
  const m = teamById(memberId); if (!m) return;
  const label = (document.getElementById('indLabel').value || 'Indispo').trim();
  const start = document.getElementById('indStart').value, end = document.getElementById('indEnd').value;
  if (!start || !end) { toast('Renseigne les deux dates.'); return; }
  if (end < start) { toast('La fin doit être après le début.'); return; }
  const arr = parseIndispos(m.indispos); arr.push({ start, end, label });
  persistIndispos(memberId, arr);
}
function removeIndispo(memberId, idx) {
  const m = teamById(memberId); if (!m) return;
  const arr = parseIndispos(m.indispos); arr.splice(idx, 1);
  persistIndispos(memberId, arr);
}

// ============================================================================
// Données : Grist + démo
// ============================================================================
function bindToolbar() {
  document.getElementById('navPrev').onclick = () => { S.offset--; render(); };
  document.getElementById('navNext').onclick = () => { S.offset++; render(); };
  document.getElementById('navToday').onclick = () => { S.offset = 0; render(); };
  document.getElementById('selGroup').onchange = (e) => { S.groupBy = e.target.value; render(); };
  document.getElementById('chkDone').onchange = (e) => { S.includeDone = e.target.checked; render(); };
  document.getElementById('chkDerive').onchange = (e) => { S.derive = e.target.checked; render(); };
  document.getElementById('chkWorkdays').onchange = (e) => { S.workdays = e.target.checked; render(); };
  document.getElementById('btnExport').onclick = () => window.print();
  document.getElementById('pClose').onclick = closePanel;
  document.getElementById('overlay').onclick = closePanel;
}

async function loadGrist() {
  const [tasks, team, projects] = await Promise.all([
    grist.docApi.fetchTable('Tasks').catch(() => null),
    grist.docApi.fetchTable('Team').catch(() => null),
    grist.docApi.fetchTable('Projects').catch(() => null)
  ]);
  S.tasks = tasks ? TF.columnarToRows(tasks) : [];
  S.team = team ? TF.columnarToRows(team) : [];
  S.projects = projects ? TF.columnarToRows(projects) : [];
  render();
}

    { id: 2, titre: 'Design UI', statut: 'inprogress', projet: 2, dateDebut: g(0), dateEcheance: g(6), charges: '[{"teamId":3,"heures":30}]', tempsPasse: 24 },
    { id: 3, titre: 'Tests QA', statut: 'todo', projet: 1, dateDebut: g(5), dateEcheance: g(13), charges: '[{"teamId":2,"heures":22}]' },
    { id: 4, titre: 'Pilotage / coordination', statut: 'inprogress', projet: 1, dateDebut: g(0), dateEcheance: g(20), charges: '[{"teamId":4,"heures":16}]' },
    { id: 5, titre: 'Documentation', statut: 'done', projet: 2, dateDebut: g(7), dateEcheance: g(11), charges: '[{"teamId":1,"heures":12}]' },
    { id: 6, titre: 'Specs à cadrer', statut: 'todo', projet: 1, dateDebut: null, dateEcheance: null, charges: '[{"teamId":3,"heures":10}]' },
    { id: 7, titre: 'Hotfix critique', statut: 'inprogress', projet: 1, dateDebut: g(7), dateEcheance: g(8), charges: '[{"teamId":2,"heures":30}]' }
  ];

bindToolbar();
// Hors Grist (ouverture directe, frame top) -> mode démo. Dans Grist -> iframe.
if (window.self === window.top) {
  loadDemo();
} else {
  try {
    grist.ready({ requiredAccess: 'full' });
    grist.onRecords(() => loadGrist());
    loadGrist();
    setTimeout(() => { if (!S.team.length && !S.tasks.length) loadDemo(); }, 2500); // filet
  } catch (e) {
    loadDemo();
  }
}
